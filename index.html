<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GhostType Pro | Stable v6</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        :root { --primary: #38bdf8; --accent: #f472b6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        .card { background: var(--card); width: 100%; max-width: 480px; padding: 25px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .dot { height: 8px; width: 8px; background: #4ade80; border-radius: 50%; display: inline-block; box-shadow: 0 0 8px #4ade80; }

        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 10px; box-sizing: border-box; }
        textarea { height: 90px; resize: none; font-size: 14px; }
        
        .btn-sync { background: var(--primary); color: #0f172a; width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-sync:hover { background: #7dd3fc; transform: translateY(-2px); }

        .msg-card { background: rgba(255,255,255,0.05); padding: 15px; margin-top: 15px; border-radius: 12px; border-left: 4px solid var(--primary); position: relative; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .copy-btn { position: absolute; top: 10px; right: 10px; font-size: 10px; background: var(--primary); border: none; border-radius: 4px; padding: 2px 6px; cursor: pointer; }
        .progress-bar { height: 4px; background: var(--accent); width: 100%; margin-top: 8px; border-radius: 2px; transition: width 1s linear; }
        
        #status { font-size: 10px; text-align: center; margin-top: 10px; color: #94a3b8; }
        .secure-tag { color: var(--accent); font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

<div class="card animate__animated animate__fadeIn">
    <div class="header">
        <h2 style="margin:0; color:var(--primary);">GhostType <small style="color:white; font-size:10px;">PRO v6</small></h2>
        <div><span class="dot"></span> <small>Online</small></div>
    </div>

    <input id="deviceName" placeholder="👤 Device Name">
    <textarea id="textInput" placeholder="Paste clipboard content here..."></textarea>
    
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
        <label style="font-size:13px; cursor:pointer;"><input type="checkbox" id="secureCheck"> 🔒 OTP Lock</label>
        <span id="charCount" style="font-size:11px; color:var(--primary);">0 chars</span>
    </div>

    <button class="btn-sync" onclick="sendData()">Sync Clipboard</button>
    <div id="otpBox" style="text-align:center; color:var(--accent); font-weight:bold; margin-top:10px;"></div>
    
    <div id="status">Ready to Sync</div>
    <hr style="border:0; border-top:1px solid #334155; margin:20px 0;">
    <div id="messages"></div>
</div>



<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyDRsNoO7wS4tY9G_VFwRTsTDWwHaYbJGl4",
        authDomain: "ghosttype-67c57.firebaseapp.com",
        databaseURL: "https://ghosttype-67c57-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ghosttype-67c57",
        storageBucket: "ghosttype-67c57.firebasestorage.app",
        messagingSenderId: "965426759949",
        appId: "1:965426759949:web:08740170d41fda24478844"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("v6_pro_stable");
    const SECRET = "BRECW_2026_SECURE";

    // --- CHARACTER COUNTER ---
    document.getElementById("textInput").addEventListener("input", function() {
        document.getElementById("charCount").innerText = this.value.length + " chars";
    });

    // --- SEND LOGIC ---
    function sendData() {
        const text = document.getElementById("textInput").value.trim();
        const device = document.getElementById("deviceName").value || "Phantom Device";
        const isSecure = document.getElementById("secureCheck").checked;

        if (!text) return alert("Clipboard is empty!");

        const encrypted = CryptoJS.AES.encrypt(text, SECRET).toString();
        let otp = null;
        let expiry = null;

        if (isSecure) {
            otp = Math.floor(100000 + Math.random() * 900000).toString();
            expiry = Date.now() + 60000;
            document.getElementById("otpBox").innerText = "CONFIDENTIAL OTP: " + otp;
        } else {
            document.getElementById("otpBox").innerText = "";
        }

        db.push({ device, payload: encrypted, isSecure, otp, expiry, time: new Date().toLocaleTimeString() })
          .then(() => {
              document.getElementById("textInput").value = "";
              document.getElementById("status").innerText = "Last Sync: " + new Date().toLocaleTimeString();
          });
    }

    // --- RECEIVE LOGIC ---
    db.on("child_added", (snap) => {
        const data = snap.val();
        const id = snap.key;
        renderMessage(id, data);
    });

    function renderMessage(id, data) {
        const container = document.getElementById("messages");
        const div = document.createElement("div");
        div.className = "msg-card";
        div.id = `msg-${id}`;

        let html = `<small style="color:#94a3b8">${data.device} • ${data.time}</small>
                    <button class="copy-btn" onclick="copyText('${id}')" id="copy-btn-${id}" style="display:none;">Copy</button>`;

        if (data.isSecure) {
            html += `<div id="locked-${id}">
                        <p class="secure-tag">🔒 LOCKED PACKET</p>
                        <div class="progress-bar" id="bar-${id}"></div>
                        <div style="display:flex; gap:5px; margin-top:10px;">
                            <input type="text" id="otp-in-${id}" placeholder="OTP" style="margin:0; padding:5px; width:80px;">
                            <button onclick="unlock('${id}','${data.otp}','${data.payload}',${data.expiry})" style="background:var(--primary); border:none; border-radius:5px; padding:5px 10px; cursor:pointer; font-size:12px;">Unlock</button>
                        </div>
                     </div>
                     <div id="show-${id}" style="display:none; font-weight:bold; color:var(--primary); margin-top:10px; word-break:break-all;"></div>`;
            startTimer(id, data.expiry);
        } else {
            const dec = CryptoJS.AES.decrypt(data.payload, SECRET).toString(CryptoJS.enc.Utf8);
            html += `<div id="content-${id}" style="margin-top:8px; font-size:14px; word-break:break-all;">${dec}</div>`;
            setTimeout(() => document.getElementById(`copy-btn-${id}`).style.display = 'block', 100);
        }

        div.innerHTML = html;
        container.prepend(div);
    }

    // --- TIMER & AUTO-DELETE ---
    function startTimer(id, expiry) {
        const t = setInterval(() => {
            const diff = expiry - Date.now();
            if (diff <= 0) {
                clearInterval(t);
                const card = document.getElementById(`msg-${id}`);
                if (card) {
                    card.innerHTML = "<small style='color:#64748b;'>Packet Purged (Expired)</small>";
                    setTimeout(() => card.remove(), 2000);
                }
                db.child(id).remove();
                return;
            }
            const bar = document.getElementById(`bar-${id}`);
            if (bar) bar.style.width = (diff / 60000 * 100) + "%";
        }, 1000);
    }

    // --- UTILITIES ---
    window.unlock = (id, correct, payload, expiry) => {
        const input = document.getElementById(`otp-in-${id}`).value;
        if (input === correct && Date.now() < expiry) {
            const dec = CryptoJS.AES.decrypt(payload, SECRET).toString(CryptoJS.enc.Utf8);
            document.getElementById(`locked-${id}`).style.display = "none";
            document.getElementById(`show-${id}`).innerText = dec;
            document.getElementById(`show-${id}`).style.display = "block";
            document.getElementById(`copy-btn-${id}`).style.display = "block";
        } else {
            alert("Invalid OTP or Expired!");
        }
    };

    window.copyText = (id) => {
        const t = document.getElementById(`show-${id}`)?.innerText || document.getElementById(`content-${id}`).innerText;
        navigator.clipboard.writeText(t);
        alert("Clipboard Updated!");
    };
</script>

</body>
</html>
