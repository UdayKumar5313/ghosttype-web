<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostType Ultra | Enterprise Security</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        :root { --p: #38bdf8; --s: #f472b6; --bg: #0f172a; --g: rgba(255,255,255,0.05); --b: rgba(255,255,255,0.1); --t: #f8fafc; }
        body { background: var(--bg); color: var(--t); font-family: 'Inter', sans-serif; margin: 0; padding: 15px; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .glass { background: var(--g); backdrop-filter: blur(12px); border: 1px solid var(--b); border-radius: 24px; padding: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        #auth-container { width: 100%; max-width: 400px; text-align: center; }
        
        .pass-container { position: relative; width: 100%; }
        .toggle-btn { position: absolute; right: 12px; top: 12px; cursor: pointer; font-size: 14px; opacity: 0.6; color: var(--t); }
        
        input, textarea { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--b); color: var(--t); border-radius: 12px; padding: 12px; margin-bottom: 12px; box-sizing: border-box; }
        .btn-p { background: var(--p); color: #000; border: none; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        .btn-google { background: white; color: #000; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px; }
        
        #app-container { display: none; width: 100%; max-width: 950px; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { #app-container { display: grid; grid-template-columns: 380px 1fr; align-items: start; } }
        
        .msg-card { background: var(--g); border: 1px solid var(--b); padding: 15px; margin-bottom: 15px; border-radius: 18px; position: relative; }
        .logout-btn { background: none; border: 1px solid var(--s); color: var(--s); padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body>

    <div id="auth-container" class="glass animate__animated animate__fadeIn">
        <h1 style="color: var(--p); font-size: 24px; margin-bottom: 5px;">GhostType Ultra</h1>
        <p style="font-size: 12px; color: #94a3b8; margin-bottom: 25px;">Enterprise Grade Clipboard Sync</p>
        
        <input type="email" id="email" placeholder="Email Address">
        
        <div class="pass-container">
            <input type="password" id="pass" placeholder="Password">
            <span class="toggle-btn" onclick="togglePassword()">👁️</span>
        </div>
        
        <button class="btn-p" onclick="handleAuth(true)">Login / Register</button>
        
        <div style="margin: 20px 0; border-bottom: 1px solid var(--b); position: relative;">
            <span style="position: absolute; top: -10px; left: 42%; background: #1a1e2e; padding: 0 10px; font-size: 10px; color: #64748b;">OR</span>
        </div>

        <button class="btn-p btn-google" onclick="googleSignIn()">
            <img src="https://img.icons8.com/color/24/000000/google-logo.png"/> Continue with Google
        </button>
        
        <p id="auth-error" style="color: var(--s); font-size: 11px; margin-top: 10px;"></p>
    </div>

    <div id="app-container">
        <div class="sticky" style="position: sticky; top: 15px;">
            <div class="glass">
                <h1 style="display: flex; justify-content: space-between; align-items: center; color: var(--p); font-size: 20px;">
                    SYNC PANEL <button class="logout-btn" onclick="logout()">LOGOUT</button>
                </h1>
                <input id="deviceName" placeholder="👤 Identity (e.g. Uday's Phone)">
                <textarea id="textInput" placeholder="Paste data to sync..."></textarea>
                <button class="btn-p" onclick="sendData()">⚡ Sync Clipboard</button>
            </div>
        </div>

        <div class="glass">
            <h2 style="margin:0 0 20px 0; font-size:18px;">History Stream</h2>
            <div id="msgs"></div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDRsNoO7wS4tY9G_VFwRTsTDWwHaYbJGl4",
        authDomain: "ghosttype-67c57.firebaseapp.com",
        databaseURL: "https://ghosttype-67c57-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ghosttype-67c57",
        storageBucket: "ghosttype-67c57.firebasestorage.app",
        messagingSenderId: "965426759949",
        appId: "1:965426759949:web:08740170d41fda24478844"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database().ref("v7_master_sync");
    const MASTER_KEY = "GHOST_ULTRA_2026_KEY";

    // --- AUTH LOGIC ---
    function togglePassword() {
        const p = document.getElementById("pass");
        p.type = p.type === "password" ? "text" : "password";
    }

    function googleSignIn() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(e => {
            document.getElementById('auth-error').innerText = e.message;
        });
    }

    function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        // Attempt login, if fails, attempt register (simplified for demo)
        auth.signInWithEmailAndPassword(email, pass).catch(() => {
            auth.createUserWithEmailAndPassword(email, pass).catch(e => {
                document.getElementById('auth-error').innerText = e.message;
            });
        });
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app-container').style.display = 'grid';
            initApp();
        } else {
            document.getElementById('auth-container').style.display = 'block';
            document.getElementById('app-container').style.display = 'none';
        }
    });

    // --- APP LOGIC ---
    function initApp() {
        document.getElementById("deviceName").value = localStorage.getItem('gName') || "";
        db.on("child_added", snap => renderCard(snap.key, snap.val()));
    }

    function sendData() {
        const text = document.getElementById("textInput").value.trim();
        const dev = document.getElementById("deviceName").value || "Node";
        if(!text) return;
        const encrypted = CryptoJS.AES.encrypt(text, MASTER_KEY).toString();
        db.push({ dev, payload: encrypted, time: new Date().toLocaleTimeString() });
        document.getElementById("textInput").value = "";
    }

    function renderCard(id, data) {
        const card = document.createElement("div");
        card.className = "msg-card animate__animated animate__fadeInUp";
        const dec = CryptoJS.AES.decrypt(data.payload, MASTER_KEY).toString(CryptoJS.enc.Utf8);
        card.innerHTML = `<small style="color:var(--p)">👤 ${data.dev} • ${data.time}</small><br><div style="margin-top:8px;">${dec}</div>`;
        document.getElementById("msgs").prepend(card);
    }
</script>
</body>
</html>
