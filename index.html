<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostType Ultra | Secure Sync</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>

    <div class="glass-panel">
        <header>
            <h1>GhostType <span class="badge">ULTRA</span></h1>
            <p class="subtitle">End-to-End Encrypted Clipboard</p>
        </header>
        
        <div class="input-group">
            <input id="deviceName" placeholder="👤 Device Identity (e.g., iPhone 15)">
            <textarea id="textInput" placeholder="Type or paste sensitive data..."></textarea>
            
            <div class="secure-toggle">
                <input type="checkbox" id="secureCheck">
                <label for="secureCheck">🔒 Enable OTP & Auto-Destruct</label>
            </div>
            
            <button onclick="sendData()" class="primary-btn">Sync to Cloud</button>
            <div id="otpDisplay" class="otp-banner"></div>
        </div>

        <div class="history-section">
            <h3><span class="dot"></span> Live Stream</h3>
            <div id="messages"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
