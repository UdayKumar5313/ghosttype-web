<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostType Platinum | Fixed v7.1</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <style>
        :root { 
            --p: #00f2ff; --s: #ff007a; --bg: #020617; 
            --glass: rgba(10, 15, 30, 0.85);
            --border: rgba(0, 242, 255, 0.2);
            --font: 'JetBrains Mono', monospace;
        }
        
        body { 
            background: #000; color: #e2e8f0; font-family: var(--font);
            margin: 0; overflow-x: hidden; min-height: 100vh;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .container { 
            max-width: 1200px; margin: 0 auto; display: grid; 
            grid-template-columns: 1fr; gap: 30px; padding: 20px;
        }
        
        @media (min-width: 1024px) { 
            .container { grid-template-columns: 380px 1fr; padding: 40px 20px; }
            .sticky-panel { position: sticky; top: 20px; }
        }

        .glass { 
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 15px;
            padding: 25px; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        input, textarea {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--border);
            color: #fff; border-radius: 8px; padding: 12px; margin-bottom: 12px;
            font-family: var(--font); box-sizing: border-box;
        }

        .btn-p {
            background: linear-gradient(90deg, var(--p), #7000ff);
            color: #000; border: none; padding: 14px; border-radius: 8px;
            font-weight: 700; width: 100%; cursor: pointer; transition: 0.2s;
        }

        .msg-card {
            background: rgba(15, 23, 42, 0.9); border-left: 3px solid var(--p);
            padding: 15px; margin-bottom: 15px; border-radius: 0 10px 10px 0;
            animation: fadeInRight 0.3s ease;
        }

        .progress-bar { height: 2px; background: var(--s); width: 100%; transition: width 0.1s linear; margin: 10px 0; }
        .panic-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div id="panic" class="panic-overlay"><h1 style="color:#222">ENCRYPTION_HALTED</h1></div>

    <div id="auth-container" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
        <div class="glass animate__animated animate__zoomIn" style="width: 350px; text-align: center;">
            <h2 id="auth-title" style="color: var(--p);">GHOST_LOGIN</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-p" onclick="handleAuth()">INITIALIZE</button>
            <p onclick="toggleMode()" style="font-size: 10px; cursor: pointer; margin-top: 15px; color: var(--s);">TOGGLE REGISTRATION</p>
        </div>
    </div>

    <div id="app-container" class="container" style="display: none;">
        <div class="sticky-panel">
            <div class="glass">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <div id="status" style="width:8px; height:8px; background:#10b981; border-radius:50%;"></div>
                    <small id="user-display" style="color:var(--p); font-size:10px;"></small>
                    <button onclick="logout()" style="color:var(--s); background:none; border:1px solid; font-size:9px; cursor:pointer;">EXIT</button>
                </div>
                <input id="deviceName" placeholder="NODE_NAME">
                <textarea id="textInput" rows="3" placeholder="PAYLOAD..."></textarea>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="timerInput" value="60" title="TTL (sec)">
                    <label style="font-size:9px;"><input type="checkbox" id="isSec"> OTP_ENCRYPT</label>
                </div>
                <button class="btn-p" onclick="sendData()">PUSH_TO_RELAY</button>
                <div id="otpDisplay" style="text-align:center; font-size:24px; color:var(--s); margin-top:10px;"></div>
            </div>
        </div>

        <div id="msgs"></div>
    </div>

<script>
    // --- 3D Background ---
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let w, h, stars = [];
    const initBG = () => {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        stars = Array(150).fill().map(() => ({ x: Math.random()*w-w/2, y: Math.random()*h-h/2, z: Math.random()*w }));
    };
    const drawBG = () => {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);
        stars.forEach(s => {
            s.z -= 3; if(s.z <= 0) s.z = w;
            const x = s.x*(w/s.z)+w/2, y = s.y*(h/s.z)+h/2;
            ctx.fillStyle = `rgba(0,242,255,${1-s.z/w})`;
            ctx.beginPath(); ctx.arc(x,y,(1-s.z/w)*3,0,Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(drawBG);
    };
    window.onresize = initBG; initBG(); drawBG();

    // --- Firebase Logic ---
    const firebaseConfig = {
        apiKey: "AIzaSyDRsNoO7wS4tY9G_VFwRTsTDWwHaYbJGl4",
        authDomain: "ghosttype-67c57.firebaseapp.com",
        databaseURL: "https://ghosttype-67c57-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ghosttype-67c57"
    };
    
    // Initialize
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database().ref("v8_platinum_fixed");
    const KEY = "PLATINUM_2026_SECURE";

    let isLogin = true;
    const toggleMode = () => { isLogin = !isLogin; document.getElementById('auth-title').innerText = isLogin ? "GHOST_LOGIN" : "REGISTER_NODE"; };
    
    const handleAuth = () => {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(isLogin) auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
        else auth.createUserWithEmailAndPassword(e, p).catch(err => alert(err.message));
    };

    const logout = () => auth.signOut().then(() => location.reload());

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app-container').style.display = 'grid';
            document.getElementById('user-display').innerText = user.email.split('@')[0].toUpperCase();
            initApp();
        }
    });

    function initApp() {
        document.getElementById('deviceName').value = localStorage.getItem('gNodeName') || "NODE_01";
        db.on("child_added", snap => render(snap.key, snap.val()));
        db.on("child_removed", snap => document.getElementById(`msg-${snap.key}`)?.remove());
    }

    function sendData() {
        const txt = document.getElementById('textInput').value.trim();
        if(!txt) return;
        const dev = document.getElementById('deviceName').value || "NODE";
        const sec = document.getElementById('isSec').checked;
        const dur = parseInt(document.getElementById('timerInput').value) || 60;
        
        localStorage.setItem('gNodeName', dev);
        const enc = CryptoJS.AES.encrypt(txt, KEY).toString();
        const otp = sec ? Math.floor(1000 + Math.random()*8999).toString() : null;
        const exp = Date.now() + (dur * 1000);

        if(sec) document.getElementById('otpDisplay').innerText = `OTP: ${otp}`;
        
        db.push({ dev, payload: enc, secure: sec, otp, exp, dur, sender: auth.currentUser.email });
        document.getElementById('textInput').value = "";
    }

    function render(id, data) {
        const card = document.createElement('div');
        card.id = `msg-${id}`;
        card.className = "msg-card";
        
        let bodyHtml = "";
        if(data.secure) {
            bodyHtml = `
                <div id="lock-${id}">
                    <div style="font-size:10px; color:var(--s); margin-bottom:10px;">ENCRYPTED_NODE_DATA</div>
                    <div style="display:flex; gap:10px;">
                        <input id="otp-in-${id}" placeholder="OTP" style="margin:0; padding:5px; height:30px;">
                        <button class="btn-p" style="padding:0 10px; width:auto; height:30px; font-size:10px;" onclick="unlock('${id}','${data.otp}','${data.payload}')">OPEN</button>
                    </div>
                </div>
                <div id="body-${id}" style="display:none; color:var(--p); font-size:13px; word-break:break-all;"></div>
            `;
        } else {
            const dec = CryptoJS.AES.decrypt(data.payload, KEY).toString(CryptoJS.enc.Utf8);
            bodyHtml = `<div style="font-size:13px; word-break:break-all;">${dec}</div>`;
        }

        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; font-size:9px; color:var(--p); margin-bottom:8px;">
                <span>ID: ${data.dev}</span>
                <span onclick="firebase.database().ref('v8_platinum_fixed').child('${id}').remove()" style="cursor:pointer; color:var(--s)">[X]</span>
            </div>
            ${bodyHtml}
            <div class="progress-bar" id="bar-${id}"></div>
            <div style="font-size:8px; opacity:0.5; text-align:right;" id="time-${id}">--</div>
        `;
        document.getElementById('msgs').prepend(card);
        startTimer(id, data.exp, data.dur);
    }

    function startTimer(id, exp, dur) {
        const itv = setInterval(() => {
            const rem = exp - Date.now();
            const bar = document.getElementById(`bar-${id}`);
            const txt = document.getElementById(`time-${id}`);
            if(rem <= 0 || !bar) {
                clearInterval(itv);
                if(bar) db.child(id).remove();
                return;
            }
            bar.style.width = (rem / (dur * 1000) * 100) + "%";
            txt.innerText = Math.ceil(rem/1000) + "s";
        }, 100);
    }

    // Explicitly attach to window for HTML onclick access
    window.unlock = (id, otp, pay) => {
        const input = document.getElementById(`otp-in-${id}`).value;
        if(input === otp) {
            try {
                const dec = CryptoJS.AES.decrypt(pay, KEY).toString(CryptoJS.enc.Utf8);
                document.getElementById(`lock-${id}`).style.display = "none";
                const b = document.getElementById(`body-${id}`);
                b.innerText = dec;
                b.style.display = "block";
                navigator.clipboard.writeText(dec);
            } catch(e) { alert("Decryption Error"); }
        } else { alert("ACCESS_DENIED"); }
    };

    // Panic Key
    window.onkeydown = (e) => { if(e.key === "Escape") { const p = document.getElementById('panic'); p.style.display = p.style.display === "flex" ? "none" : "flex"; } };
</script>
</body>
</html>
