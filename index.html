<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostType Ultra | 2026 Professional</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        :root { --p: #38bdf8; --s: #f472b6; --bg: #0f172a; --g: rgba(255,255,255,0.05); --b: rgba(255,255,255,0.1); --t: #f8fafc; }
        body { background: var(--bg); color: var(--t); font-family: 'Inter', sans-serif; margin: 0; padding: 15px; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow-x: hidden; }
        
        /* Glassmorphism Design */
        .glass { background: var(--g); backdrop-filter: blur(16px); border: 1px solid var(--b); border-radius: 28px; padding: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        #auth-container { width: 100%; max-width: 400px; text-align: center; }
        
        #app-container { display: none; width: 100%; max-width: 1000px; grid-template-columns: 1fr; gap: 25px; }
        @media (min-width: 768px) { #app-container { display: grid; grid-template-columns: 400px 1fr; align-items: start; } .sticky { position: sticky; top: 20px; } }

        /* UI Elements */
        .pass-box { position: relative; width: 100%; }
        .eye { position: absolute; right: 15px; top: 12px; cursor: pointer; opacity: 0.6; }
        input, textarea { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--b); color: var(--t); border-radius: 14px; padding: 14px; margin-bottom: 12px; box-sizing: border-box; font-size: 14px; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--p); box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); outline: none; }
        
        .btn-p { background: linear-gradient(135deg, var(--p), #0ea5e9); color: #0f172a; border: none; padding: 15px; border-radius: 14px; font-weight: 800; width: 100%; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-p:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3); }
        
        /* Message Cards */
        .msg-card { background: rgba(255,255,255,0.03); border: 1px solid var(--b); padding: 20px; margin-bottom: 15px; border-radius: 20px; position: relative; transition: 0.3s; }
        .msg-card:hover { background: rgba(255,255,255,0.06); border-color: var(--p); }
        .bar-wrap { height: 4px; background: rgba(0,0,0,0.4); width: 100%; border-radius: 10px; margin-top: 12px; overflow: hidden; }
        .bar { height: 100%; background: linear-gradient(90deg, var(--s), #db2777); width: 100%; transition: width 1s linear; }
        
        .trash { position: absolute; top: 18px; right: 18px; cursor: pointer; opacity: 0.4; font-size: 18px; }
        .trash:hover { color: var(--s); opacity: 1; transform: scale(1.2); }
        .status-dot { height: 10px; width: 10px; background: #4ade80; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #4ade80; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="auth-container" class="glass animate__animated animate__fadeInDown">
        <h1 id="auth-title" style="color: var(--p); margin-bottom: 5px; font-size: 28px;">GhostType</h1>
        <p style="font-size: 13px; color: #94a3b8; margin-bottom: 25px;">E2EE Secure Clipboard Sync</p>
        
        <input type="email" id="email" placeholder="Email Address">
        <div class="pass-box">
            <input type="password" id="pass" placeholder="Password">
            <span class="eye" onclick="togglePass()">👁️</span>
        </div>
        
        <button id="auth-btn" class="btn-p" onclick="handleAuth()">Sign In</button>
        <p onclick="toggleMode()" id="toggle-link" style="font-size: 12px; color: #94a3b8; margin-top: 20px; cursor: pointer; text-decoration: underline;">New user? Create an account</p>
        <p id="auth-error" style="color: var(--s); font-size: 11px; margin-top: 12px;"></p>
    </div>

    <div id="app-container">
        <div class="sticky">
            <div class="glass animate__animated animate__fadeInLeft">
                <h1 style="font-size: 22px; display: flex; justify-content: space-between; margin-bottom: 20px;">
                    CONTROL <button onclick="logout()" style="background:none; border: 1px solid var(--s); color: var(--s); font-size: 10px; padding: 5px 12px; border-radius: 8px; cursor: pointer;">LOGOUT</button>
                </h1>
                
                <input id="deviceName" placeholder="👤 Identity (e.g. Uday's Phone)" oninput="localStorage.setItem('gName', this.value)">
                <textarea id="textInput" placeholder="Paste sensitive text..."></textarea>
                
                <div style="display:flex; justify-content:space-between; align-items:center; font-size:12px; color:var(--p); margin-bottom:15px; font-weight:600;">
                    <span id="stats">0 Chars | 0 Words</span>
                    <label style="cursor:pointer; display:flex; align-items:center;"><input type="checkbox" id="isSec" style="margin-right:8px;"> 🔒 OTP Lock</label>
                </div>
                
                <button class="btn-p" onclick="sendData()">⚡ Encrypt & Sync</button>
                <div id="otpDisplay" style="text-align:center; color:var(--s); font-weight:bold; margin-top:18px; font-family: 'Courier New', monospace; font-size: 20px; letter-spacing: 2px;"></div>
                <div id="net-status" style="margin-top:25px; text-align:center; font-size:11px; color:#94a3b8;"><span class="status-dot"></span> SECURE CHANNEL LIVE</div>
            </div>
        </div>

        <div class="glass animate__animated animate__fadeInRight">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                <h2 style="margin:0; font-size:20px; letter-spacing:-0.5px;">Cloud Stream</h2>
                <input id="search" placeholder="🔍 Search History..." oninput="searchMsgs()" style="width:160px; margin:0; padding:8px 15px; font-size:12px; border-radius: 20px;">
            </div>
            <div id="msgs"></div>
        </div>
    </div>



<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyDRsNoO7wS4tY9G_VFwRTsTDWwHaYbJGl4",
        authDomain: "ghosttype-67c57.firebaseapp.com",
        databaseURL: "https://ghosttype-67c57-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ghosttype-67c57",
        storageBucket: "ghosttype-67c57.firebasestorage.app",
        messagingSenderId: "965426759949",
        appId: "1:965426759949:web:08740170d41fda24478844"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database().ref("v7_master_sync");
    const MASTER_KEY = "GHOST_ULTRA_2026_KEY";
    const notificationSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');

    let isLoginMode = true;

    // --- AUTH UI ---
    function togglePass() {
        const p = document.getElementById("pass");
        p.type = p.type === "password" ? "text" : "password";
    }

    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById("auth-title").innerText = isLoginMode ? "GhostType" : "Join GhostType";
        document.getElementById("auth-btn").innerText = isLoginMode ? "Sign In" : "Register";
        document.getElementById("toggle-link").innerText = isLoginMode ? "New user? Create an account" : "Back to Login";
    }

    function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        if (isLoginMode) {
            auth.signInWithEmailAndPassword(email, pass).catch(e => document.getElementById('auth-error').innerText = e.message);
        } else {
            auth.createUserWithEmailAndPassword(email, pass).catch(e => document.getElementById('auth-error').innerText = e.message);
        }
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app-container').style.display = 'grid';
            initApp();
        } else {
            document.getElementById('auth-container').style.display = 'block';
            document.getElementById('app-container').style.display = 'none';
        }
    });

    // --- TEXT STATS ---
    document.getElementById("textInput").addEventListener("input", function() {
        const text = this.value;
        const words = text.trim() ? text.trim().split(/\s+/).length : 0;
        document.getElementById("stats").innerText = `${text.length} Chars | ${words} Words`;
    });

    // --- MAIN APP ---
    function initApp() {
        document.getElementById("deviceName").value = localStorage.getItem('gName') || "";
        db.on("child_added", snap => renderCard(snap.key, snap.val()));
        db.on("child_removed", snap => {
            const el = document.getElementById(`msg-${snap.key}`);
            if(el) {
                el.classList.add('animate__animated', 'animate__zoomOut');
                setTimeout(() => el.remove(), 500);
            }
        });
        
        // Connectivity Monitor
        window.addEventListener('offline', () => {
            document.querySelector('.status-dot').style.background = '#f87171';
            document.getElementById('net-status').innerText = "OFFLINE - SYNC PAUSED";
        });
        window.addEventListener('online', () => {
            document.querySelector('.status-dot').style.background = '#4ade80';
            document.getElementById('net-status').innerText = "SECURE CHANNEL LIVE";
        });
    }

    function sendData() {
        const text = document.getElementById("textInput").value.trim();
        const dev = document.getElementById("deviceName").value || "Unknown Device";
        const secure = document.getElementById("isSec").checked;
        if(!text) return;

        // AES-256 Client-Side Encryption
        const encrypted = CryptoJS.AES.encrypt(text, MASTER_KEY).toString();
        let otp = secure ? Math.floor(100000 + Math.random()*900000).toString() : null;
        let exp = secure ? Date.now() + 60000 : null;

        if(secure) document.getElementById("otpDisplay").innerText = "OTP: " + otp;
        db.push({ dev, payload: encrypted, secure, otp, exp, time: new Date().toLocaleTimeString() });
        document.getElementById("textInput").value = "";
    }

    function renderCard(id, data) {
        notificationSound.play().catch(()=>{});
        const container = document.getElementById("msgs");
        const card = document.createElement("div");
        card.className = "msg-card animate__animated animate__slideInUp";
        card.id = `msg-${id}`;
        card.dataset.txt = "";

        let html = `<div style="display:flex; justify-content:space-between; margin-bottom:10px;"><small style="color:var(--p); font-weight:700;">👤 ${data.dev} • ${data.time}</small><span class="trash" onclick="db.child('${id}').remove()">🗑️</span></div>`;

        if(data.secure) {
            html += `<span style="font-size:10px; color:var(--s); font-weight:800; letter-spacing:1px;">🔒 AES-256 ENCRYPTED</span><div class="bar-wrap"><div class="bar" id="bar-${id}"></div></div>
                     <div id="lock-${id}" style="margin-top:15px; display:flex; gap:10px;">
                        <input id="in-${id}" placeholder="OTP" style="margin:0; width:90px; padding:8px; font-size:12px; background:rgba(0,0,0,0.5);">
                        <button onclick="unlock('${id}','${data.otp}','${data.payload}',${data.exp})" style="padding:8px 15px; background:var(--s); color:white; border:none; border-radius:10px; cursor:pointer; font-size:11px; font-weight:bold;">DECRYPT</button>
                     </div><div id="show-${id}" style="display:none; margin-top:15px; font-weight:bold; color:var(--p); word-break:break-all; font-size:14px; background:rgba(0,0,0,0.2); padding:12px; border-radius:12px; border: 1px solid var(--b);"></div>`;
            handleTimer(id, data.exp);
        } else {
            const dec = CryptoJS.AES.decrypt(data.payload, MASTER_KEY).toString(CryptoJS.enc.Utf8);
            card.dataset.txt = dec.toLowerCase();
            html += `<div style="font-size:14px; word-break:break-all; margin-top:8px; line-height:1.6;">${dec}</div>
                     <button onclick="copyTo('${dec}')" style="background:var(--p); border:none; border-radius:8px; font-size:10px; padding:5px 12px; margin-top:12px; cursor:pointer; color:#0f172a; font-weight:800;">COPY CONTENT</button>`;
        }
        card.innerHTML = html;
        container.prepend(card);
    }

    function handleTimer(id, exp) {
        const itv = setInterval(() => {
            const diff = exp - Date.now();
            if(diff <= 0) { clearInterval(itv); db.child(id).remove(); return; }
            const b = document.getElementById(`bar-${id}`);
            if(b) b.style.width = (diff/60000*100) + "%";
        }, 1000);
    }

    window.unlock = (id, correct, payload, exp) => {
        const val = document.getElementById(`in-${id}`).value;
        if(val === correct && Date.now() < exp) {
            const bytes = CryptoJS.AES.decrypt(payload, MASTER_KEY);
            const dec = bytes.toString(CryptoJS.enc.Utf8);
            document.getElementById(`lock-${id}`).style.display="none";
            const display = document.getElementById(`show-${id}`);
            display.innerText = dec;
            display.style.display="block";
            document.getElementById(`msg-${id}`).dataset.txt = dec.toLowerCase();
        } else { 
            const el = document.getElementById(`msg-${id}`);
            el.classList.add('animate__animated', 'animate__headShake');
            setTimeout(() => el.classList.remove('animate__animated', 'animate__headShake'), 500);
            alert("Security Alert: Invalid OTP"); 
        }
    };

    window.copyTo = (txt) => { navigator.clipboard.writeText(txt); alert("Synchronized to Clipboard!"); };

    function searchMsgs() {
        const q = document.getElementById("search").value.toLowerCase();
        document.querySelectorAll('.msg-card').forEach(c => c.style.display = c.dataset.txt.includes(q) ? 'block' : 'none');
    }
</script>
</body>
</html>
