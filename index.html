<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GhostType Ultra | Input Fix</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #1e293b; width: 100%; max-width: 450px; padding: 25px; border-radius: 15px; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #38bdf8; text-align: center; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; background: #0f172a; border: 1px solid #475569; color: white; border-radius: 8px; box-sizing: border-box; }
        textarea { height: 100px; font-size: 14px; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        #otpAlert { color: #f472b6; font-weight: bold; text-align: center; margin-bottom: 10px; font-family: monospace; min-height: 20px; }
        .msg-card { background: #334155; padding: 15px; margin-top: 10px; border-radius: 8px; border-left: 4px solid #38bdf8; word-wrap: break-word; }
        .secure { border-left-color: #f472b6; }
        #status-bar { font-size: 10px; color: #4ade80; margin-top: 10px; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>

<div class="card">
    <h1>GhostType <span style="font-size: 12px; color: #94a3b8;">SECURE</span></h1>
    
    <input type="text" id="deviceName" placeholder="👤 Device Name (e.g. Laptop)">
    <textarea id="textInput" placeholder="Paste your text here..."></textarea>
    
    <div class="row">
        <label style="font-size: 13px; cursor: pointer;"><input type="checkbox" id="secureCheck"> 🔒 OTP Lock</label>
    </div>
    
    <button id="mainSendBtn">Sync Clipboard Now</button>
    
    <div id="otpAlert"></div>
    <div id="status-bar">System Standby...</div>
    <hr style="border: 0; border-top: 1px solid #334155; margin: 20px 0;">
    <div id="messages"></div>
</div>



<script>
    // --- 1. FIREBASE SETUP ---
    const firebaseConfig = {
        apiKey: "AIzaSyDRsNoO7wS4tY9G_VFwRTsTDWwHaYbJGl4",
        authDomain: "ghosttype-67c57.firebaseapp.com",
        databaseURL: "https://ghosttype-67c57-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ghosttype-67c57",
        storageBucket: "ghosttype-67c57.firebasestorage.app",
        messagingSenderId: "965426759949",
        appId: "1:965426759949:web:08740170d41fda24478844"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("v4_stable_sync");
    const MASTER_KEY = "GHOST_KEY_2026";

    // --- 2. ENSURE DOM IS LOADED ---
    document.addEventListener("DOMContentLoaded", () => {
        const sendBtn = document.getElementById("mainSendBtn");
        const status = document.getElementById("status-bar");
        
        status.innerText = "Firebase Connected ✅";

        // --- 3. SEND LOGIC ---
        sendBtn.addEventListener("click", () => {
            const devEl = document.getElementById("deviceName");
            const txtEl = document.getElementById("textInput");
            const secEl = document.getElementById("secureCheck");

            const device = devEl.value || "Anonymous Device";
            const textContent = txtEl.value.trim(); // Trim removes accidental spaces

            if (!textContent || textContent === "") {
                alert("Error: Please paste or type some text first!");
                return;
            }

            status.innerText = "Encrypting & Sending...";

            // AES Encryption
            const encrypted = CryptoJS.AES.encrypt(textContent, MASTER_KEY).toString();
            
            let otp = null;
            let expiry = null;

            if (secEl.checked) {
                otp = Math.floor(100000 + Math.random() * 900000).toString();
                expiry = Date.now() + 60000; // 60s
                document.getElementById("otpAlert").innerText = "YOUR SECURE OTP: " + otp;
            } else {
                document.getElementById("otpAlert").innerText = "";
            }

            db.push({
                device,
                payload: encrypted,
                isSecure: secEl.checked,
                otp,
                expiry,
                time: new Date().toLocaleTimeString()
            }).then(() => {
                status.innerText = "Sync Successful! 🚀";
                txtEl.value = ""; // Clear box after success
                setTimeout(() => { status.innerText = "System Standby..."; }, 2000);
            }).catch((err) => {
                status.innerText = "Error: " + err.message;
            });
        });

        // --- 4. RECEIVE LOGIC ---
        db.on("child_added", (snap) => {
            const data = snap.val();
            const id = snap.key;

            const div = document.createElement("div");
            div.className = data.isSecure ? "msg-card secure" : "msg-card";
            div.id = `card-${id}`;

            let html = `<small style="color:#94a3b8">${data.device} • ${data.time}</small>`;

            if (data.isSecure) {
                html += `
                    <div id="lock-${id}">
                        <p style="margin:5px 0; color:#f472b6;">🔒 Locked Content (<span id="timer-${id}">01:00</span>)</p>
                        <input type="text" id="otp-in-${id}" placeholder="Enter OTP" style="width:100px; padding:5px; margin-bottom:5px;">
                        <button style="width:auto; padding:5px 10px;" onclick="unlock('${id}', '${data.otp}', '${data.payload}', ${data.expiry})">Unlock</button>
                    </div>
                    <div id="show-${id}" style="display:none; color:#38bdf8; font-weight:bold; margin-top:10px; white-space: pre-wrap;"></div>
                `;
                runTimer(id, data.expiry);
            } else {
                const bytes = CryptoJS.AES.decrypt(data.payload, MASTER_KEY);
                const original = bytes.toString(CryptoJS.enc.Utf8);
                html += `<div style="margin-top:5px; white-space: pre-wrap;">${original}</div>`;
            }

            div.innerHTML = html;
            document.getElementById("messages").prepend(div);
        });
    });

    // --- 5. TIMER & UNLOCK ---
    function runTimer(id, expiry) {
        const timerTask = setInterval(() => {
            const diff = expiry - Date.now();
            if (diff <= 0) {
                clearInterval(timerTask);
                const card = document.getElementById(`card-${id}`);
                if (card) { 
                    card.innerHTML = "<small style='color:gray;'>Data Expired & Deleted</small>";
                    db.child(id).remove(); 
                }
                return;
            }
            const s = Math.floor((diff % 60000) / 1000);
            const tDisplay = document.getElementById(`timer-${id}`);
            if (tDisplay) tDisplay.innerText = `00:${s.toString().padStart(2, '0')}`;
        }, 1000);
    }

    window.unlock = function(id, correct, payload, expiry) {
        const entered = document.getElementById(`otp-in-${id}`).value;
        if (Date.now() > expiry) return alert("OTP Expired!");
        
        if (entered === correct) {
            const bytes = CryptoJS.AES.decrypt(payload, MASTER_KEY);
            document.getElementById(`lock-${id}`).style.display = "none";
            const display = document.getElementById(`show-${id}`);
            display.innerText = bytes.toString(CryptoJS.enc.Utf8);
            display.style.display = "block";
        } else {
            alert("Incorrect OTP!");
        }
    };
</script>

</body>
</html>
