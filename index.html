<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostType Ultra | 2026 Multi-Tool</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root { --p: #38bdf8; --s: #f472b6; --bg: #0f172a; --g: rgba(255,255,255,0.03); --b: rgba(255,255,255,0.08); --t: #f8fafc; --danger: #fb7185; }
        body { background: #0f172a; color: var(--t); font-family: 'Inter', sans-serif; margin: 0; padding: 15px; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .glass { background: var(--g); backdrop-filter: blur(25px); border: 1px solid var(--b); border-radius: 24px; padding: 25px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 100%; }
        #app-container { display: none; max-width: 1100px; grid-template-columns: 1fr; gap: 20px; width: 100%; }
        @media (min-width: 850px) { #app-container { display: grid; grid-template-columns: 380px 1fr; } .sticky { position: sticky; top: 20px; } }
        
        input, textarea, select { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--b); color: var(--t); border-radius: 12px; padding: 12px; margin-bottom: 10px; font-size: 13px; }
        .btn-p { background: linear-gradient(135deg, var(--p), #818cf8); color: #0f172a; border: none; padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; transition: 0.2s; }
        .btn-p:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .msg-card { background: rgba(255,255,255,0.02); border: 1px solid var(--b); padding: 18px; margin-bottom: 15px; border-radius: 18px; position: relative; }
        .badge { font-size: 9px; background: var(--b); color: var(--p); padding: 3px 8px; border-radius: 5px; text-transform: uppercase; font-weight: bold; margin-right: 5px; }
        .file-box { background: rgba(56, 189, 248, 0.1); border: 1px dashed var(--p); padding: 10px; border-radius: 10px; margin-top: 10px; text-align: center; cursor: pointer; }
        
        /* Markdown override */
        .markdown-body { font-size: 14px; line-height: 1.5; color: #cbd5e1; }
        .markdown-body code { background: #1e293b; padding: 2px 4px; border-radius: 4px; font-family: monospace; }
        
        #session-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); z-index: 100; display: none; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }
    </style>
</head>
<body>

    <div id="session-overlay" class="animate__animated animate__fadeIn">
        <div class="glass" style="max-width: 400px; text-align: center;">
            <h2 style="color:var(--p)">Session Key Required</h2>
            <p style="font-size: 12px; color:#64748b;">This key stays on your device. It is NEVER sent to the server. Data cannot be decrypted without it.</p>
            <input type="password" id="sessionKey" placeholder="Enter Vault Key (AES-256)">
            <button class="btn-p" onclick="unlockSession()">Unlock Local Vault</button>
        </div>
    </div>

    <div id="auth-container" class="glass" style="max-width: 400px; text-align: center;">
        <h1 style="color: var(--p); margin:0;">GhostType <span style="font-size: 12px; vertical-align: middle; opacity: 0.5;">v2026</span></h1>
        <p style="font-size: 12px; color: #64748b; margin-bottom: 25px;">Encrypted Relay Protocol</p>
        <input type="email" id="email" placeholder="Node Email">
        <input type="password" id="pass" placeholder="Node Password">
        <button class="btn-p" onclick="handleAuth()">Initialize Sync</button>
        <p id="auth-error" style="color: var(--danger); font-size: 11px; margin-top: 10px;"></p>
    </div>

    <div id="app-container">
        <div class="sticky">
            <div class="glass">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                    <span class="badge" id="current-channel">CHANNEL: DEFAULT</span>
                    <button onclick="logout()" style="background:none; border:none; color:var(--danger); font-size:10px; cursor:pointer;">LOGOUT</button>
                </div>

                <input id="channelID" placeholder="Channel ID (Shared Key)" oninput="updateChannel(this.value)">
                
                <textarea id="textInput" rows="4" placeholder="Type message or paste code..."></textarea>
                
                <input type="file" id="fileInput" style="display:none" onchange="handleFile(this)">
                <div class="file-box" onclick="document.getElementById('fileInput').click()">
                    <span id="file-label">📎 Attach Small File (< 1MB)</span>
                </div>

                <div style="display:flex; flex-wrap:wrap; gap:10px; font-size:11px; margin: 15px 0;">
                    <label><input type="checkbox" id="isSec"> 🔒 OTP Lock</label>
                    <label><input type="checkbox" id="isBurn"> 🔥 Burn on Read</label>
                </div>
                
                <button class="btn-p" onclick="sendData()">Push Encrypted Payload</button>
                
                <div id="otpDisplay" style="text-align:center; color:var(--s); font-family:monospace; font-size:24px; margin-top:15px;"></div>
            </div>
        </div>

        <div class="glass">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="margin:0; font-size:16px;">Secure Relay Stream</h2>
                <button onclick="clearCloud()" style="font-size:9px; background:rgba(251,113,133,0.1); color:var(--danger); border:1px solid var(--danger); padding:4px 8px; border-radius:5px; cursor:pointer;">WIPE CLOUD</button>
            </div>
            <div id="msgs"></div>
        </div>
    </div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyDRsNoO7wS4tY9G_VFwRTsTDWwHaYbJGl4",
        authDomain: "ghosttype-67c57.firebaseapp.com",
        databaseURL: "https://ghosttype-67c57-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ghosttype-67c57",
        storageBucket: "ghosttype-67c57.firebasestorage.app",
        messagingSenderId: "965426759949",
        appId: "1:965426759949:web:08740170d41fda24478844"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    let currentChannel = "v7_master_sync";
    let LOCAL_VAULT_KEY = "";
    let pendingFile = null;

    // --- SESSION MGMT ---
    function unlockSession() {
        const key = document.getElementById('sessionKey').value;
        if(key.length < 4) return alert("Key too short.");
        LOCAL_VAULT_KEY = key;
        document.getElementById('session-overlay').style.display = 'none';
        initApp();
    }

    function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        auth.signInWithEmailAndPassword(email, pass).catch(e => document.getElementById('auth-error').innerText = e.message);
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('session-overlay').style.display = 'flex';
        }
    });

    function logout() { auth.signOut().then(() => location.reload()); }

    function updateChannel(val) {
        currentChannel = val ? `chan_${val.replace(/\s/g, '_')}` : "v7_master_sync";
        document.getElementById('current-channel').innerText = `CHANNEL: ${currentChannel.toUpperCase()}`;
        document.getElementById('msgs').innerHTML = "";
        firebase.database().ref(currentChannel).off();
        initApp();
    }

    function initApp() {
        const db = firebase.database().ref(currentChannel);
        db.on("child_added", snap => renderCard(snap.key, snap.val()));
        db.on("child_removed", snap => document.getElementById(`msg-${snap.key}`)?.remove());
    }

    // --- FILE HANDLING ---
    function handleFile(input) {
        const file = input.files[0];
        if(file.size > 1024 * 1024) return alert("File too large (>1MB)");
        const reader = new FileReader();
        reader.onload = (e) => {
            pendingFile = { name: file.name, data: e.target.result };
            document.getElementById('file-label').innerText = `✅ ${file.name} ready`;
        };
        reader.readAsDataURL(file);
    }

    // --- CORE LOGIC ---
    function sendData() {
        const text = document.getElementById("textInput").value;
        const secure = document.getElementById("isSec").checked;
        const burn = document.getElementById("isBurn").checked;
        
        if(!text && !pendingFile) return;

        const payloadObj = { text, file: pendingFile };
        const encrypted = CryptoJS.AES.encrypt(JSON.stringify(payloadObj), LOCAL_VAULT_KEY).toString();
        
        let otp = secure ? Math.floor(100000 + Math.random()*900000).toString() : null;
        let exp = secure ? Date.now() + 60000 : null;

        if(secure) document.getElementById("otpDisplay").innerText = `OTP: ${otp}`;
        
        firebase.database().ref(currentChannel).push({
            payload: encrypted,
            secure, burn, otp, exp,
            time: new Date().toLocaleTimeString(),
            node: "Node_" + Math.floor(Math.random()*99)
        });

        // Reset
        document.getElementById("textInput").value = "";
        document.getElementById("file-label").innerText = "📎 Attach Small File (< 1MB)";
        pendingFile = null;
    }

    function renderCard(id, data) {
        const container = document.getElementById("msgs");
        const card = document.createElement("div");
        card.className = "msg-card animate__animated animate__fadeInUp";
        card.id = `msg-${id}`;

        let html = `<div style="display:flex; justify-content:space-between;">
                        <div>
                            <span class="badge">CHNL</span>
                            ${data.burn ? '<span class="badge" style="color:var(--danger)">🔥 BURN</span>' : ''}
                        </div>
                        <span onclick="firebase.database().ref(currentChannel).child('${id}').remove()" style="cursor:pointer; opacity:0.3;">✕</span>
                    </div>
                    <div style="font-size:10px; color:#64748b; margin: 8px 0;">${data.node} • ${data.time}</div>`;

        if(data.secure) {
            html += `<div id="lock-${id}">
                        <input id="in-${id}" placeholder="Enter OTP" style="margin:0; width:80px; padding:5px;">
                        <button onclick="unlock('${id}','${data.otp}','${data.payload}',${data.burn})" class="btn-p" style="width:auto; padding:5px 15px; font-size:10px;">DECRYPT</button>
                     </div>`;
        } else {
            html += `<div id="cont-${id}">${processPayload(data.payload, id, data.burn)}</div>`;
        }

        card.innerHTML = html;
        container.prepend(card);
    }

    function processPayload(encrypted, id, burn) {
        try {
            const bytes = CryptoJS.AES.decrypt(encrypted, LOCAL_VAULT_KEY);
            const decrypted = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
            
            let content = "";
            // 3. Markdown Rendering
            if(decrypted.text) content += `<div class="markdown-body">${marked.parse(decrypted.text)}</div>`;
            
            if(decrypted.file) {
                content += `<button onclick="downloadFile('${decrypted.file.data}', '${decrypted.file.name}')" class="btn-p" style="margin-top:10px; font-size:10px;">💾 Download ${decrypted.file.name}</button>`;
            }

            // 4. Burn on Read Logic
            if(burn) {
                setTimeout(() => {
                    firebase.database().ref(currentChannel).child(id).remove();
                }, 2000);
            }

            return content;
        } catch(e) {
            return `<div style="color:var(--danger); font-size:11px;">[Vault Key Mismatch: Encrypted]</div>`;
        }
    }

    window.unlock = (id, correct, payload, burn) => {
        if(document.getElementById(`in-${id}`).value === correct) {
            document.getElementById(`lock-${id}`).innerHTML = processPayload(payload, id, burn);
        } else {
            alert("Wrong OTP");
        }
    };

    window.downloadFile = (data, name) => {
        const link = document.createElement("a");
        link.href = data;
        link.download = name;
        link.click();
    };

    function clearCloud() {
        if(confirm("Wipe all data in this channel?")) {
            firebase.database().ref(currentChannel).remove();
        }
    }
</script>
</body>
</html>
