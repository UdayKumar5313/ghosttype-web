<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GhostType Ultra | Final Fix</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #1e293b; width: 100%; max-width: 450px; padding: 25px; border-radius: 15px; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #38bdf8; text-align: center; margin: 0 0 20px 0; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; background: #0f172a; border: 1px solid #475569; color: white; border-radius: 8px; box-sizing: border-box; }
        textarea { height: 80px; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #otpAlert { color: #f472b6; font-weight: bold; text-align: center; font-family: monospace; height: 20px; margin-bottom: 10px; }
        .msg-card { background: #334155; padding: 15px; margin-top: 10px; border-radius: 8px; border-left: 4px solid #38bdf8; }
        .secure { border-left-color: #f472b6; }
        .timer { color: #f472b6; font-family: monospace; font-weight: bold; }
        /* Debug Console */
        #console { width: 100%; max-width: 450px; background: #000; color: #0f0; font-family: monospace; font-size: 11px; padding: 10px; margin-top: 20px; border-radius: 5px; height: 100px; overflow-y: auto; opacity: 0.7; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>

<div class="card">
    <h1>GhostType <span style="font-size: 12px; color: #94a3b8;">SECURE SYNC</span></h1>
    
    <input id="deviceName" placeholder="👤 Device Name">
    <textarea id="textInput" placeholder="Paste text here..."></textarea>
    
    <div class="row">
        <label style="font-size: 13px;"><input type="checkbox" id="secureCheck"> 🔒 OTP Protection</label>
        <button onclick="sendData()">Sync Now</button>
    </div>
    
    <div id="otpAlert"></div>
    <div id="messages"></div>
</div>

<div id="console">Initializing system...</div>



<script>
    // 1. LOGGING FUNCTION
    function log(msg) {
        const c = document.getElementById("console");
        c.innerHTML += "> " + msg + "<br>";
        c.scrollTop = c.scrollHeight;
    }

    // 2. FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyDRsNoO7wS4tY9G_VFwRTsTDWwHaYbJGl4",
        authDomain: "ghosttype-67c57.firebaseapp.com",
        databaseURL: "https://ghosttype-67c57-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ghosttype-67c57",
        storageBucket: "ghosttype-67c57.firebasestorage.app",
        messagingSenderId: "965426759949",
        appId: "1:965426759949:web:08740170d41fda24478844"
    };

    // 3. INITIALIZE
    try {
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("final_demo_sync");
        const SECRET = "GHOST_2026_KEY";
        log("Firebase Connected.");

        // 4. SEND FUNCTION
        window.sendData = function() {
            const dev = document.getElementById("deviceName").value || "Web User";
            const txt = document.getElementById("textInput").value;
            const isSec = document.getElementById("secureCheck").checked;
            
            if(!txt) { log("Error: Empty Input"); return; }

            // AES Encryption
            const encrypted = CryptoJS.AES.encrypt(txt, SECRET).toString();
            
            let otp = null, expiry = null;
            if(isSec) {
                otp = Math.floor(100000 + Math.random() * 900000).toString();
                expiry = Date.now() + 60000;
                document.getElementById("otpAlert").innerText = "OTP: " + otp;
            } else {
                document.getElementById("otpAlert").innerText = "";
            }

            db.push({
                dev, payload: encrypted, isSec, otp, expiry, time: new Date().toLocaleTimeString()
            }).then(() => log("Data sent successfully."));

            document.getElementById("textInput").value = "";
        };

        // 5. RECEIVE FUNCTION
        db.on("child_added", (snap) => {
            const data = snap.val();
            const id = snap.key;
            log("New packet received from " + data.dev);

            const div = document.createElement("div");
            div.className = data.isSec ? "msg-card secure" : "msg-card";
            div.id = `card-${id}`;

            let html = `<small style="color:#94a3b8">${data.dev} • ${data.time}</small>`;

            if(data.isSec) {
                html += `
                    <div id="lock-${id}">
                        <p style="margin:5px 0; color:#f472b6;">🔒 Secure: <span id="timer-${id}" class="timer">01:00</span></p>
                        <input type="text" id="otp-in-${id}" placeholder="Enter OTP" style="width:80px; padding:5px; margin:0;">
                        <button style="padding:5px; font-size:11px;" onclick="unlock('${id}', '${data.otp}', '${data.payload}', ${data.expiry})">Unlock</button>
                    </div>
                    <div id="show-${id}" style="display:none; color:#38bdf8; font-weight:bold; margin-top:10px;"></div>
                `;
                startTimer(id, data.expiry);
            } else {
                const bytes = CryptoJS.AES.decrypt(data.payload, SECRET);
                const original = bytes.toString(CryptoJS.enc.Utf8);
                html += `<div style="margin-top:5px;">${original}</div>`;
            }

            div.innerHTML = html;
            document.getElementById("messages").prepend(div);
        });

        // 6. TIMER & UNLOCK
        function startTimer(id, expiry) {
            const t = setInterval(() => {
                const diff = expiry - Date.now();
                if(diff <= 0) {
                    clearInterval(t);
                    const el = document.getElementById(`card-${id}`);
                    if(el) { el.innerHTML = "<i>Packet Expired & Purged</i>"; el.style.opacity = "0.5"; }
                    db.child(id).remove();
                    return;
                }
                const s = Math.floor((diff % 60000) / 1000);
                const ms = diff % 1000;
                const timerDisplay = document.getElementById(`timer-${id}`);
                if(timerDisplay) timerDisplay.innerText = `${s}:${ms}`;
            }, 50);
        }

        window.unlock = function(id, correct, payload, expiry) {
            const entered = document.getElementById(`otp-in-${id}`).value;
            if(Date.now() > expiry) return log("Error: Link Expired.");
            if(entered === correct) {
                const bytes = CryptoJS.AES.decrypt(payload, SECRET);
                document.getElementById(`lock-${id}`).style.display = "none";
                document.getElementById(`show-${id}`).innerText = bytes.toString(CryptoJS.enc.Utf8);
                document.getElementById(`show-${id}`).style.display = "block";
                log("Success: Packet Decrypted.");
            } else {
                log("Error: Invalid OTP.");
            }
        };

    } catch (e) {
        log("CRITICAL ERROR: " + e.message);
    }
</script>

</body>
</html>
