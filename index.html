<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostType Ultra | Premium Glass</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        :root { 
            --primary: #38bdf8; 
            --accent: #f472b6; 
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            background: radial-gradient(circle at top left, #1e293b, #0f172a); 
            color: #f8fafc; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* Responsive Container */
        .container {
            width: 100%;
            max-width: 900px; /* Wider for Desktop */
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Desktop Grid Alignment */
        @media (min-width: 768px) {
            .container {
                grid-template-columns: 400px 1fr; /* Split Screen for Desktop */
                align-items: start;
            }
            .sticky-side { position: sticky; top: 20px; }
        }

        h1 { color: var(--primary); font-size: 22px; margin: 0 0 20px 0; letter-spacing: -1px; display: flex; align-items: center; justify-content: space-between;}
        .badge { background: var(--primary); color: #000; font-size: 10px; padding: 2px 8px; border-radius: 6px; }

        /* Inputs & Buttons */
        input, textarea {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            color: white; border-radius: 12px; padding: 12px; margin-bottom: 12px; box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; background: rgba(0,0,0,0.5); }

        .btn-sync {
            background: var(--primary); color: #0f172a; border: none; padding: 15px;
            border-radius: 12px; font-weight: 700; width: 100%; cursor: pointer;
            transition: 0.3s ease;
        }
        .btn-sync:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* Message Cards */
        .msg-card {
            background: var(--glass); border: 1px solid var(--border);
            padding: 15px; margin-bottom: 15px; border-radius: 16px;
            position: relative; overflow: hidden;
        }
        .secure-tag { color: var(--accent); font-size: 11px; font-weight: bold; margin-bottom: 5px; display: block;}
        
        .progress-bar { height: 3px; background: var(--accent); width: 100%; border-radius: 2px; margin-top: 10px; transition: width 1s linear;}
        
        .status-dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px #4ade80; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<div class="container animate__animated animate__fadeIn">
    
    <div class="sticky-side">
        <div class="glass-panel">
            <h1>GhostType <span class="badge">ULTRA</span></h1>
            
            <input id="deviceName" placeholder="👤 Device Name (e.g. My PC)">
            <textarea id="textInput" placeholder="Paste sensitive text..."></textarea>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <label style="font-size: 12px; cursor: pointer; color: #94a3b8;">
                    <input type="checkbox" id="isSec"> 🔒 Secure with OTP
                </label>
                <small id="charCount" style="color: var(--primary);">0 chars</small>
            </div>

            <button class="btn-sync" onclick="sendData()">Sync Clipboard</button>
            <div id="otpDisplay" style="text-align: center; color: var(--accent); font-weight: bold; margin-top: 15px; font-family: monospace;"></div>
            
            <div style="margin-top: 15px; text-align: center; font-size: 10px; color: #64748b;">
                <span class="status-dot"></span> System Encrypted & Live
            </div>
        </div>
    </div>

    <div class="glass-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="font-size: 18px; margin: 0;">Live History</h2>
            <input type="text" id="search" placeholder="🔍 Search..." style="width: 150px; margin: 0; padding: 5px 10px; font-size: 12px; border-radius: 20px;">
        </div>
        <div id="messages"></div>
    </div>

</div>



<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyDRsNoO7wS4tY9G_VFwRTsTDWwHaYbJGl4",
        authDomain: "ghosttype-67c57.firebaseapp.com",
        databaseURL: "https://ghosttype-67c57-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ghosttype-67c57",
        storageBucket: "ghosttype-67c57.firebasestorage.app",
        messagingSenderId: "965426759949",
        appId: "1:965426759949:web:08740170d41fda24478844"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("v7_master_sync");
    const KEY = "GHOST_ULTRA_SECURE_2026";
    const pingSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');

    // Persistence & Counter
    document.getElementById("deviceName").value = localStorage.getItem('gName') || "";
    document.getElementById("textInput").oninput = (e) => {
        document.getElementById("charCount").innerText = e.target.value.length + " chars";
    };

    function sendData() {
        const text = document.getElementById("textInput").value.trim();
        const dev = document.getElementById("deviceName").value || "Unknown";
        const secure = document.getElementById("isSec").checked;
        if(!text) return;

        localStorage.setItem('gName', dev);
        const encrypted = CryptoJS.AES.encrypt(text, KEY).toString();
        let otp = secure ? Math.floor(100000 + Math.random()*900000).toString() : null;
        let exp = secure ? Date.now() + 60000 : null;

        if(secure) document.getElementById("otpDisplay").innerText = "CONFIDENTIAL OTP: " + otp;
        db.push({ dev, payload: encrypted, secure, otp, exp, time: new Date().toLocaleTimeString() });
        document.getElementById("textInput").value = "";
    }

    db.on("child_added", (snap) => {
        pingSound.play().catch(()=>{});
        const data = snap.val(); const id = snap.key;
        renderCard(id, data);
    });

    function renderCard(id, data) {
        const container = document.getElementById("messages");
        const card = document.createElement("div");
        card.className = "msg-card animate__animated animate__slideInRight";
        card.id = `msg-${id}`;

        let html = `<div style="display:flex; justify-content:space-between;"><small style="color:var(--primary)">${data.dev}</small><small style="color:#64748b">${data.time}</small></div>`;

        if(data.secure) {
            html += `<span class="secure-tag">🔒 SECURE PACKET</span>
                     <div class="progress-bar" id="bar-${id}"></div>
                     <div id="lock-${id}" style="margin-top:10px; display:flex; gap:10px;">
                        <input id="in-${id}" placeholder="OTP" style="margin:0; width:80px; padding:5px;">
                        <button onclick="unlock('${id}','${data.otp}','${data.payload}',${data.exp})" style="padding:5px 10px; width:auto; font-size:11px; background:var(--accent); color:white; border-radius:8px; border:none; cursor:pointer;">Reveal</button>
                     </div>
                     <div id="show-${id}" style="display:none; margin-top:10px; font-weight:bold; color:var(--primary); word-break:break-all;"></div>`;
            handleExpiry(id, data.exp);
        } else {
            const dec = CryptoJS.AES.decrypt(data.payload, KEY).toString(CryptoJS.enc.Utf8);
            html += `<div style="margin-top:10px; word-break:break-all; font-size:14px;">${dec}</div>`;
        }

        card.innerHTML = html;
        container.prepend(card);
    }

    function handleExpiry(id, exp) {
        const itv = setInterval(() => {
            const diff = exp - Date.now();
            if(diff <= 0) {
                clearInterval(itv);
                const el = document.getElementById(`msg-${id}`);
                if(el) { el.style.opacity = '0.5'; el.innerHTML = "<small>Link Expired & Purged</small>"; setTimeout(()=>el.remove(), 2000); }
                db.child(id).remove();
                return;
            }
            const bar = document.getElementById(`bar-${id}`);
            if(bar) bar.style.width = (diff/60000*100) + "%";
        }, 1000);
    }

    window.unlock = (id, correct, payload, exp) => {
        const val = document.getElementById(`in-${id}`).value;
        if(val === correct && Date.now() < exp) {
            const dec = CryptoJS.AES.decrypt(payload, KEY).toString(CryptoJS.enc.Utf8);
            document.getElementById(`lock-${id}`).style.display="none";
            document.getElementById(`show-${id}`).innerText = dec;
            document.getElementById(`show-${id}`).style.display="block";
        } else { alert("Wrong OTP!"); }
    };
    
    // Deletion Sync
    db.on("child_removed", (snap) => {
        const el = document.getElementById(`msg-${snap.key}`);
        if(el) el.remove();
    });
</script>
</body>
</html>
