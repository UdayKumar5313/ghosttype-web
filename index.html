<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostType Ultra | 2026 Seminar Gold</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        :root { --p: #38bdf8; --s: #f472b6; --bg: #0f172a; --g: rgba(255,255,255,0.03); --b: rgba(255,255,255,0.08); --t: #f8fafc; }
        body { background: radial-gradient(circle at top left, #1e293b, #0f172a); color: var(--t); font-family: 'Inter', sans-serif; margin: 0; padding: 15px; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow-x: hidden; }
        
        .glass { background: var(--g); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--b); border-radius: 32px; padding: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6); }
        #auth-container { width: 100%; max-width: 420px; text-align: center; }
        
        #app-container { display: none; width: 100%; max-width: 1000px; grid-template-columns: 1fr; gap: 25px; }
        @media (min-width: 768px) { #app-container { display: grid; grid-template-columns: 420px 1fr; align-items: start; } .sticky { position: sticky; top: 20px; } }

        .pass-box { position: relative; width: 100%; }
        .eye { position: absolute; right: 18px; top: 14px; cursor: pointer; opacity: 0.5; font-size: 18px; }
        input, textarea { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--b); color: var(--t); border-radius: 16px; padding: 16px; margin-bottom: 15px; box-sizing: border-box; font-size: 14px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        input:focus, textarea:focus { border-color: var(--p); box-shadow: 0 0 20px rgba(56, 189, 248, 0.15); outline: none; background: rgba(0,0,0,0.6); }
        
        .btn-p { background: linear-gradient(135deg, #38bdf8, #818cf8); color: #0f172a; border: none; padding: 18px; border-radius: 16px; font-weight: 900; width: 100%; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1.5px; font-size: 14px; }
        .btn-p:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 15px 30px rgba(56, 189, 248, 0.3); }

        .msg-card { background: rgba(255,255,255,0.02); border: 1px solid var(--b); padding: 22px; margin-bottom: 20px; border-radius: 24px; position: relative; transition: 0.4s ease; border-left: 5px solid transparent; }
        .msg-card:hover { border-left-color: var(--p); background: rgba(255,255,255,0.05); transform: translateX(5px); }
        .bar-wrap { height: 5px; background: rgba(0,0,0,0.5); width: 100%; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .bar { height: 100%; background: linear-gradient(90deg, #f472b6, #fb7185); width: 100%; transition: width 1s linear; }
        
        .trash { position: absolute; top: 20px; right: 20px; cursor: pointer; opacity: 0.3; transition: 0.3s; }
        .trash:hover { color: #f87171; opacity: 1; transform: rotate(15deg); }
        .status-dot { height: 10px; width: 10px; background: #4ade80; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #4ade80; }
        
        .audit-badge { font-size: 9px; background: rgba(56, 189, 248, 0.1); color: var(--p); padding: 4px 8px; border-radius: 6px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body class="animate__animated animate__fadeIn">

    <div id="auth-container" class="glass animate__animated animate__zoomIn">
        <h1 id="auth-title" style="color: var(--p); margin-bottom: 5px; font-size: 32px; letter-spacing: -1.5px;">GhostType</h1>
        <p style="font-size: 14px; color: #64748b; margin-bottom: 30px;">Cross-Device Encryption Relay</p>
        
        <input type="email" id="email" placeholder="Institutional Email">
        <div class="pass-box">
            <input type="password" id="pass" placeholder="Secure Password">
            <span class="eye" onclick="togglePass()">👁️</span>
        </div>
        
        <button id="auth-btn" class="btn-p" onclick="handleAuth()">Access Terminal</button>
        <p onclick="toggleMode()" id="toggle-link" style="font-size: 12px; color: #94a3b8; margin-top: 25px; cursor: pointer;">New node? Initialize registration</p>
        <p id="auth-error" style="color: #fb7185; font-size: 11px; margin-top: 15px;"></p>
    </div>

    <div id="app-container">
        <div class="sticky">
            <div class="glass animate__animated animate__fadeInLeft">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                    <h2 style="margin:0; font-size:18px; color:var(--p);">SYNC NODE</h2>
                    <button onclick="logout()" style="background:none; border: 1px solid #fb7185; color: #fb7185; font-size: 10px; padding: 6px 14px; border-radius: 10px; cursor: pointer; font-weight:bold;">DISCONNECT</button>
                </div>
                
                <input id="deviceName" placeholder="👤 Identity (e.g. Uday_Laptop_01)" oninput="localStorage.setItem('gName', this.value)">
                <textarea id="textInput" placeholder="Enter sensitive data for relay..."></textarea>
                
                <div style="display:flex; justify-content:space-between; align-items:center; font-size:12px; color:var(--p); margin-bottom:18px; font-weight:bold;">
                    <span id="stats">Ready to Encrypt</span>
                    <label style="cursor:pointer; display:flex; align-items:center;"><input type="checkbox" id="isSec" style="margin-right:8px; scale:1.2;"> 🔒 OTP Layer</label>
                </div>
                
                <button class="btn-p" onclick="sendData()">Encrypt & Relay Data</button>
                <div id="otpDisplay" style="text-align:center; color:#fb7185; font-weight:bold; margin-top:20px; font-family: 'Courier New', monospace; font-size: 22px; letter-spacing: 4px;"></div>
                <div id="net-status" style="margin-top:30px; text-align:center; font-size:11px; color:#64748b;"><span class="status-dot"></span> P2P ENCRYPTION ACTIVE</div>
            </div>
        </div>

        <div class="glass animate__animated animate__fadeInRight">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                <h2 style="margin:0; font-size:22px; letter-spacing:-1px;">Data Stream</h2>
                <input id="search" placeholder="🔍 Audit History..." oninput="searchMsgs()" style="width:180px; margin:0; padding:10px 18px; font-size:12px; border-radius: 25px;">
            </div>
            <div id="msgs"></div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDRsNoO7wS4tY9G_VFwRTsTDWwHaYbJGl4",
        authDomain: "ghosttype-67c57.firebaseapp.com",
        databaseURL: "https://ghosttype-67c57-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ghosttype-67c57",
        storageBucket: "ghosttype-67c57.firebasestorage.app",
        messagingSenderId: "965426759949",
        appId: "1:965426759949:web:08740170d41fda24478844"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database().ref("v7_master_sync");
    const MASTER_KEY = "GHOST_ULTRA_2026_KEY";
    const notificationSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');

    let isLoginMode = true;

    function togglePass() {
        const p = document.getElementById("pass");
        p.type = p.type === "password" ? "text" : "password";
    }

    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById("auth-title").innerText = isLoginMode ? "GhostType" : "Initial Startup";
        document.getElementById("auth-btn").innerText = isLoginMode ? "Access Terminal" : "Register Node";
        document.getElementById("toggle-link").innerText = isLoginMode ? "New node? Initialize registration" : "Return to Access Terminal";
    }

    function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const err = document.getElementById('auth-error');
        if (isLoginMode) {
            auth.signInWithEmailAndPassword(email, pass).catch(e => err.innerText = "AUTH_ERROR: " + e.message);
        } else {
            auth.createUserWithEmailAndPassword(email, pass).catch(e => err.innerText = "REG_ERROR: " + e.message);
        }
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app-container').style.display = 'grid';
            initApp();
        } else {
            document.getElementById('auth-container').style.display = 'block';
            document.getElementById('app-container').style.display = 'none';
        }
    });

    document.getElementById("textInput").addEventListener("input", function() {
        const text = this.value;
        document.getElementById("stats").innerText = `${text.length} Chars | AES-Ready`;
    });

    function initApp() {
        document.getElementById("deviceName").value = localStorage.getItem('gName') || "";
        db.on("child_added", snap => renderCard(snap.key, snap.val()));
        db.on("child_removed", snap => {
            const el = document.getElementById(`msg-${snap.key}`);
            if(el) {
                el.classList.add('animate__animated', 'animate__zoomOut');
                setTimeout(() => el.remove(), 500);
            }
        });
        
        window.addEventListener('offline', () => {
            document.querySelector('.status-dot').style.background = '#fb7185';
            document.getElementById('net-status').innerText = "CONNECTION INTERRUPTED";
        });
        window.addEventListener('online', () => {
            document.querySelector('.status-dot').style.background = '#4ade80';
            document.getElementById('net-status').innerText = "P2P ENCRYPTION ACTIVE";
        });
    }

    function sendData() {
        const text = document.getElementById("textInput").value.trim();
        const dev = document.getElementById("deviceName").value || "Anonymous_Node";
        const secure = document.getElementById("isSec").checked;
        const platform = /Mobi|Android/i.test(navigator.userAgent) ? "Mobile" : "Desktop";
        
        if(!text) return;

        const encrypted = CryptoJS.AES.encrypt(text, MASTER_KEY).toString();
        let otp = secure ? Math.floor(100000 + Math.random()*900000).toString() : null;
        let exp = secure ? Date.now() + 60000 : null;

        if(secure) document.getElementById("otpDisplay").innerText = otp;
        db.push({ dev, payload: encrypted, secure, otp, exp, time: new Date().toLocaleTimeString(), platform });
        document.getElementById("textInput").value = "";
    }

    function renderCard(id, data) {
        notificationSound.play().catch(()=>{});
        const container = document.getElementById("msgs");
        const card = document.createElement("div");
        card.className = "msg-card animate__animated animate__fadeInUp";
        card.id = `msg-${id}`;
        card.dataset.txt = "";

        let html = `<div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                        <div>
                            <span class="audit-badge">AES-256 E2EE</span>
                            <span class="audit-badge" style="background:rgba(255,255,255,0.05); color:#94a3b8;">${data.platform || 'System'}</span>
                        </div>
                        <span class="trash" onclick="db.child('${id}').remove()">🗑️</span>
                    </div>
                    <div style="margin-bottom:10px;"><small style="color:var(--p); font-weight:900;">👤 ${data.dev} • ${data.time}</small></div>`;

        if(data.secure) {
            html += `<span style="font-size:10px; color:#fb7185; font-weight:800; letter-spacing:1px;">🔒 TEMPORAL PACKET</span><div class="bar-wrap"><div class="bar" id="bar-${id}"></div></div>
                     <div id="lock-${id}" style="margin-top:18px; display:flex; gap:12px;">
                        <input id="in-${id}" placeholder="Enter OTP" style="margin:0; width:100px; padding:10px; font-size:12px; background:rgba(0,0,0,0.6); border-radius:12px;">
                        <button onclick="unlock('${id}','${data.otp}','${data.payload}',${data.exp})" style="padding:10px 20px; background:#fb7185; color:white; border:none; border-radius:12px; cursor:pointer; font-size:11px; font-weight:bold;">DECRYPT</button>
                     </div><div id="show-${id}" style="display:none; margin-top:15px; font-weight:bold; color:var(--p); word-break:break-all; font-size:14px; background:rgba(0,0,0,0.3); padding:15px; border-radius:16px; border: 1px solid var(--b);"></div>`;
            handleTimer(id, data.exp);
        } else {
            const dec = CryptoJS.AES.decrypt(data.payload, MASTER_KEY).toString(CryptoJS.enc.Utf8);
            card.dataset.txt = dec.toLowerCase();
            html += `<div style="font-size:15px; word-break:break-all; margin-top:10px; line-height:1.6; color:#e2e8f0;">${dec}</div>
                     <button onclick="copyTo('${dec}')" style="background:var(--p); border:none; border-radius:10px; font-size:10px; padding:6px 15px; margin-top:15px; cursor:pointer; color:#0f172a; font-weight:900;">COPY PACKET</button>`;
        }
        card.innerHTML = html;
        container.prepend(card);
    }

    function handleTimer(id, exp) {
        const itv = setInterval(() => {
            const diff = exp - Date.now();
            if(diff <= 0) { clearInterval(itv); db.child(id).remove(); return; }
            const b = document.getElementById(`bar-${id}`);
            if(b) b.style.width = (diff/60000*100) + "%";
        }, 1000);
    }

    window.unlock = (id, correct, payload, exp) => {
        const val = document.getElementById(`in-${id}`).value;
        if(val === correct && Date.now() < exp) {
            const dec = CryptoJS.AES.decrypt(payload, MASTER_KEY).toString(CryptoJS.enc.Utf8);
            document.getElementById(`lock-${id}`).style.display="none";
            const display = document.getElementById(`show-${id}`);
            display.innerText = dec;
            display.style.display="block";
            document.getElementById(`msg-${id}`).dataset.txt = dec.toLowerCase();
        } else { 
            const el = document.getElementById(`msg-${id}`);
            el.classList.add('animate__animated', 'animate__headShake');
            setTimeout(() => el.classList.remove('animate__animated', 'animate__headShake'), 500);
        }
    };

    window.copyTo = (txt) => { navigator.clipboard.writeText(txt); alert("Content Unified with Clipboard!"); };

    function searchMsgs() {
        const q = document.getElementById("search").value.toLowerCase();
        document.querySelectorAll('.msg-card').forEach(c => c.style.display = c.dataset.txt.includes(q) ? 'block' : 'none');
    }
</script>
</body>
</html>
