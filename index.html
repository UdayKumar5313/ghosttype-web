<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostType Ultra | 2026 Black-Ops Build</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        :root { --p: #38bdf8; --s: #f472b6; --bg: #020617; --g: rgba(30, 41, 59, 0.5); --b: rgba(56, 189, 248, 0.1); --t: #f8fafc; }
        body { background: radial-gradient(circle at center, #0f172a, #020617); color: var(--t); font-family: 'Inter', sans-serif; margin: 0; padding: 15px; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow-x: hidden; }
        
        .glass { background: var(--g); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--b); border-radius: 28px; padding: 30px; box-shadow: 0 0 40px rgba(56, 189, 248, 0.1); }
        #auth-container { width: 100%; max-width: 400px; text-align: center; }
        
        #app-container { display: none; width: 100%; max-width: 1000px; grid-template-columns: 1fr; gap: 25px; }
        @media (min-width: 768px) { #app-container { display: grid; grid-template-columns: 400px 1fr; align-items: start; } .sticky { position: sticky; top: 20px; } }

        input, textarea { width: 100%; background: #0f172a; border: 1px solid var(--b); color: var(--t); border-radius: 14px; padding: 16px; margin-bottom: 15px; box-sizing: border-box; font-size: 14px; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--p); box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); outline: none; }
        
        .btn-p { background: linear-gradient(90deg, #0ea5e9, #38bdf8); color: #020617; border: none; padding: 18px; border-radius: 14px; font-weight: 900; width: 100%; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px; }
        .btn-p:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3); }

        .msg-card { background: rgba(15, 23, 42, 0.8); border: 1px solid var(--b); padding: 22px; margin-bottom: 18px; border-radius: 20px; position: relative; border-left: 4px solid var(--p); }
        .bar-wrap { height: 4px; background: rgba(0,0,0,0.5); width: 100%; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .bar { height: 100%; background: var(--s); width: 100%; transition: width 1s linear; }
        
        .status-dot { height: 8px; width: 8px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #22c55e; }
        .secure-tag { font-size: 10px; color: var(--p); font-weight: 900; letter-spacing: 1px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body class="animate__animated animate__fadeIn">

    <div id="auth-container" class="glass animate__animated animate__zoomIn">
        <h1 style="color: var(--p); margin:0; font-size: 32px; letter-spacing: -1px;">GHOSTTYPE</h1>
        <p style="font-size: 12px; color: #64748b; margin-bottom: 30px;">Zero-Trust Clipboard Relay</p>
        <input type="email" id="email" placeholder="Authorized Email">
        <input type="password" id="pass" placeholder="Master Access Key">
        <button class="btn-p" onclick="handleAuth()">Initialize Sync</button>
        <p id="toggle-link" style="font-size: 11px; color: #94a3b8; margin-top: 20px; cursor: pointer;" onclick="toggleMode()">Request Node Registration</p>
        <p id="auth-error" style="color: var(--s); font-size: 11px; margin-top: 15px;"></p>
    </div>

    <div id="app-container">
        <div class="sticky">
            <div class="glass animate__animated animate__fadeInLeft">
                <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <h2 style="margin:0; font-size:16px; color:var(--p);">NODE CONTROL</h2>
                    <button onclick="logout()" style="background:none; border: 1px solid var(--s); color: var(--s); font-size: 9px; padding: 4px 10px; border-radius: 8px; cursor: pointer;">EXIT</button>
                </div>
                <input id="deviceName" placeholder="👤 Node Identity (e.g. Hyderabad_PC)">
                <textarea id="textInput" placeholder="Input sensitive relay string..."></textarea>
                <div style="display:flex; justify-content:space-between; align-items:center; font-size:12px; margin-bottom:15px;">
                    <span id="stats" style="color: var(--p);">Ready to Relay</span>
                    <label style="cursor:pointer;"><input type="checkbox" id="isSec"> 🔒 OTP Lock</label>
                </div>
                <button class="btn-p" onclick="sendData()">Encrypt & Push</button>
                <div id="otpDisplay" style="text-align:center; color:var(--s); font-weight:bold; margin-top:15px; font-family: monospace; font-size: 20px;"></div>
                <div id="net-status" style="margin-top:25px; text-align:center; font-size:10px; color:#64748b;"><span class="status-dot"></span> P2P TUNNEL SECURED</div>
            </div>
        </div>
        <div class="glass animate__animated animate__fadeInRight">
            <h2 style="margin:0 0 25px 0; font-size:18px; letter-spacing: 1px;">ENCRYPTED DATA STREAM</h2>
            <div id="msgs"></div>
        </div>
    </div>



<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDRsNoO7wS4tY9G_VFwRTsTDWwHaYbJGl4",
        authDomain: "ghosttype-67c57.firebaseapp.com",
        databaseURL: "https://ghosttype-67c57-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ghosttype-67c57",
        storageBucket: "ghosttype-67c57.firebasestorage.app",
        messagingSenderId: "965426759949",
        appId: "1:965426759949:web:08740170d41fda24478844"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database().ref("v7_master_sync");
    const SECRET = "GHOST_ULTRA_2026_KEY";

    let isLoginMode = true;

    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById("auth-title")?.innerText = isLoginMode ? "GHOSTTYPE" : "REGISTER NODE";
        document.getElementById("auth-btn")?.innerText = isLoginMode ? "Initialize Sync" : "Register Node";
    }

    function handleAuth() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        if (isLoginMode) auth.signInWithEmailAndPassword(e, p).catch(err => document.getElementById('auth-error').innerText = err.message);
        else auth.createUserWithEmailAndPassword(e, p).catch(err => document.getElementById('auth-error').innerText = err.message);
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app-container').style.display = 'grid';
            initApp();
        }
    });

    function initApp() {
        document.getElementById("deviceName").value = localStorage.getItem('gName') || "";
        db.on("child_added", snap => renderCard(snap.key, snap.val()));
        db.on("child_removed", snap => {
            const el = document.getElementById(`msg-${snap.key}`);
            if(el) { el.classList.add('animate__animated', 'animate__fadeOutLeft'); setTimeout(() => el.remove(), 500); }
        });
    }

    function sendData() {
        const txt = document.getElementById("textInput").value.trim();
        const dev = document.getElementById("deviceName").value || "Unknown_Node";
        const sec = document.getElementById("isSec").checked;
        if(!txt) return;

        const encrypted = CryptoJS.AES.encrypt(txt, SECRET).toString();
        const encDev = CryptoJS.AES.encrypt(dev, SECRET).toString(); // Feature: Encrypted Metadata
        let otp = sec ? Math.floor(100000 + Math.random()*900000).toString() : null;
        let exp = sec ? Date.now() + 60000 : null;

        if(sec) document.getElementById("otpDisplay").innerText = otp;
        db.push({ dev: encDev, payload: encrypted, secure: sec, otp, exp, time: new Date().toLocaleTimeString() });
        document.getElementById("textInput").value = "";
    }

    function renderCard(id, data) {
        const container = document.getElementById("msgs");
        const card = document.createElement("div");
        card.className = "msg-card animate__animated animate__fadeInUp";
        card.id = `msg-${id}`;

        const decDev = CryptoJS.AES.decrypt(data.dev, SECRET).toString(CryptoJS.enc.Utf8);

        let html = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                        <span class="secure-tag">AES-256 E2EE</span>
                        <span style="cursor:pointer; opacity:0.3;" onclick="db.child('${id}').remove()">🗑️</span>
                    </div>
                    <div><small style="color:var(--p); font-weight:bold;">👤 ${decDev} • ${data.time}</small></div>`;

        if(data.secure) {
            html += `<div class="bar-wrap"><div class="bar" id="bar-${id}"></div></div>
                     <div id="lock-${id}" style="margin-top:12px; display:flex; gap:10px;">
                        <input id="in-${id}" placeholder="Enter OTP" style="margin:0; width:90px; padding:10px; font-size:12px;">
                        <button onclick="unlock('${id}','${data.otp}','${data.payload}',${data.exp})" style="padding:10px; background:var(--s); color:white; border:none; border-radius:10px; cursor:pointer; font-size:11px; font-weight:bold;">DECRYPT</button>
                     </div><div id="show-${id}" style="display:none; margin-top:12px; font-weight:bold; color:var(--p); word-break:break-all; font-size:14px; background:rgba(0,0,0,0.3); padding:12px; border-radius:12px;"></div>`;
            handleTimer(id, data.exp);
        } else {
            const dec = CryptoJS.AES.decrypt(data.payload, SECRET).toString(CryptoJS.enc.Utf8);
            html += `<div style="font-size:14px; margin-top:10px; line-height:1.6;">${dec}</div>
                     <button onclick="navigator.clipboard.writeText('${dec}'); alert('Sync to Clipboard!')" style="background:var(--p); border:none; border-radius:8px; font-size:10px; padding:6px 12px; margin-top:12px; cursor:pointer; color:#020617; font-weight:bold;">UNIFY CLIPBOARD</button>`;
        }
        card.innerHTML = html;
        container.prepend(card);
    }

    function handleTimer(id, exp) {
        const itv = setInterval(() => {
            const diff = exp - Date.now();
            if(diff <= 0) { clearInterval(itv); db.child(id).remove(); return; }
            const b = document.getElementById(`bar-${id}`);
            if(b) b.style.width = (diff/60000*100) + "%";
        }, 1000);
    }

    window.unlock = (id, correct, payload, exp) => {
        const val = document.getElementById(`in-${id}`).value;
        if(val === correct && Date.now() < exp) {
            const dec = CryptoJS.AES.decrypt(payload, SECRET).toString(CryptoJS.enc.Utf8);
            document.getElementById(`lock-${id}`).style.display="none";
            const ds = document.getElementById(`show-${id}`);
            ds.innerText = dec; ds.style.display="block";
            navigator.clipboard.writeText(dec);
        } else { 
            const el = document.getElementById(`msg-${id}`);
            el.classList.add('animate__animated', 'animate__headShake');
            setTimeout(() => el.classList.remove('animate__animated', 'animate__headShake'), 500);
        }
    };
</script>
</body>
</html>
