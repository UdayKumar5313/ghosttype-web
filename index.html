<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>GhostType Secure Clipboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

</head>

<body>

<h1>GhostType Clipboard</h1>

<input id="deviceName" placeholder="Device name">

<br><br>

<textarea id="textInput" placeholder="Paste text"></textarea>

<br>

<label>
<input type="checkbox" id="secureMessage">
Secure Message (OTP Required)
</label>

<br>

<button onclick="sendText()">Send</button>

<h2>Messages</h2>

<div id="messages"></div>

<script src="app.js"></script>

</body>

</html>
