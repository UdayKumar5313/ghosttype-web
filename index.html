<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostType Ultra | Infinity Edition</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        :root { --p: #38bdf8; --s: #f472b6; --bg: #0f172a; --g: rgba(255,255,255,0.05); --b: rgba(255,255,255,0.1); --t: #f8fafc; }
        .light { --bg: #f1f5f9; --g: rgba(0,0,0,0.05); --b: rgba(0,0,0,0.1); --t: #1e293b; }
        
        body { background: var(--bg); color: var(--t); font-family: 'Inter', sans-serif; margin: 0; padding: 15px; transition: 0.3s; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .container { width: 100%; max-width: 950px; display: grid; grid-template-columns: 1fr; gap: 20px; }
        
        @media (min-width: 768px) { 
            .container { grid-template-columns: 380px 1fr; align-items: start; } 
            .sticky { position: sticky; top: 15px; } 
        }

        .glass { background: var(--g); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--b); border-radius: 24px; padding: 25px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        h1 { color: var(--p); margin: 0 0 15px 0; font-size: 22px; display: flex; justify-content: space-between; align-items: center; letter-spacing: -1px; }
        
        input, textarea { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--b); color: var(--t); border-radius: 12px; padding: 12px; margin-bottom: 12px; box-sizing: border-box; transition: 0.3s; font-size: 14px; }
        input:focus, textarea:focus { border-color: var(--p); outline: none; background: rgba(0,0,0,0.4); }
        textarea { height: 120px; resize: none; }
        
        .btn-sync { background: var(--p); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn-sync:hover { transform: scale(1.02); filter: brightness(1.1); }
        .btn-sync:active { transform: scale(0.98); }

        .msg-card { background: var(--g); border: 1px solid var(--b); padding: 18px; margin-bottom: 15px; border-radius: 18px; position: relative; animation: slideIn 0.4s ease; transition: 0.3s; }
        .msg-card:hover { transform: translateY(-3px); background: rgba(255,255,255,0.08); }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } }
        
        .bar-wrap { height: 4px; background: rgba(0,0,0,0.2); width: 100%; border-radius: 2px; margin-top: 10px; overflow: hidden; }
        .bar { height: 100%; background: var(--s); width: 100%; transition: width 1s linear; }
        
        .dot { height: 10px; width: 10px; background: #4ade80; border-radius: 50%; display: inline-block; box-shadow: 0 0 10px #4ade80; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        .trash { position: absolute; top: 15px; right: 15px; cursor: pointer; opacity: 0.4; transition: 0.2s; font-size: 18px; }
        .trash:hover { opacity: 1; color: var(--s); transform: scale(1.2); }
        
        .badge-sec { background: var(--s); color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-bottom: 8px; display: inline-block; }
        #search { border-radius: 20px; padding: 10px 18px; margin-bottom: 20px; background: var(--g); }
    </style>
</head>
<body class="animate__animated animate__fadeIn">

<div class="container">
    <div class="sticky">
        <div class="glass animate__animated animate__fadeInLeft">
            <h1>GT ULTRA <button onclick="document.body.classList.toggle('light')" style="background:none; border:none; cursor:pointer; font-size: 20px;">🌓</button></h1>
            
            <input id="deviceName" placeholder="👤 Device Identity (e.g. My Laptop)" oninput="localStorage.setItem('gName', this.value)">
            <textarea id="textInput" placeholder="Paste sensitive text here..." oninput="updateStats()"></textarea>
            
            <div style="display:flex; justify-content:space-between; font-size:11px; color:var(--p); margin-bottom:12px; font-weight: 600;">
                <span id="stats">0 Chars | 0 Words</span>
                <label style="cursor: pointer;"><input type="checkbox" id="isSec"> 🔒 OTP Lock</label>
            </div>
            
            <button class="btn-sync" onclick="sendData()">Sync Clipboard</button>
            <div id="otpDisplay" style="text-align:center; color:var(--s); font-weight:bold; margin-top:15px; font-family: 'Courier New', monospace; font-size: 18px;"></div>
            
            <div style="margin-top:20px; text-align:center; font-size:10px; opacity:0.7; letter-spacing: 1px;">
                <span class="dot"></span> SECURE LIVE WEBSOCKET
            </div>
            
            <button onclick="nuke()" style="background:none; border:1px solid var(--s); color:var(--s); padding:8px; width:100%; border-radius:10px; margin-top:15px; cursor:pointer; font-size:10px; font-weight:bold;">NUKE CLOUD HISTORY</button>
        </div>
    </div>

    <div class="glass animate__animated animate__fadeInRight">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0; font-size:18px;">Cloud Relay Stream</h2>
            <input id="search" placeholder="🔍 Search History..." oninput="searchMsgs()" style="width:150px; margin:0; padding:8px 15px; font-size:12px;">
        </div>
        <div id="msgs"></div>
    </div>
</div>



<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyDRsNoO7wS4tY9G_VFwRTsTDWwHaYbJGl4",
        authDomain: "ghosttype-67c57.firebaseapp.com",
        databaseURL: "https://ghosttype-67c57-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ghosttype-67c57",
        storageBucket: "ghosttype-67c57.firebasestorage.app",
        messagingSenderId: "965426759949",
        appId: "1:965426759949:web:08740170d41fda24478844"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("v7_master_sync");
    const MASTER_KEY = "GHOST_ULTRA_2026_KEY";
    const notificationSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');

    // Persistence
    document.getElementById("deviceName").value = localStorage.getItem('gName') || "";

    function updateStats() {
        const text = document.getElementById("textInput").value;
        const words = text.trim() ? text.trim().split(/\s+/).length : 0;
        document.getElementById("stats").innerText = `${text.length} Chars | ${words} Words`;
    }

    // --- SEND LOGIC ---
    function sendData() {
        const text = document.getElementById("textInput").value.trim();
        const dev = document.getElementById("deviceName").value || "Phantom Node";
        const secure = document.getElementById("isSec").checked;
        if(!text) return;

        // AES-256 Encryption
        const encrypted = CryptoJS.AES.encrypt(text, MASTER_KEY).toString();
        let otp = secure ? Math.floor(100000 + Math.random()*900000).toString() : null;
        let exp = secure ? Date.now() + 60000 : null;

        if(secure) {
            document.getElementById("otpDisplay").innerText = "CONFIDENTIAL OTP: " + otp;
            if(navigator.vibrate) navigator.vibrate(100);
        } else {
            document.getElementById("otpDisplay").innerText = "";
        }

        db.push({ dev, payload: encrypted, secure, otp, exp, time: new Date().toLocaleTimeString() });
        document.getElementById("textInput").value = "";
        updateStats();
    }

    function nuke() { if(confirm("Permanently wipe entire cloud history?")) db.remove(); }

    // --- REAL-TIME RECEIVE ---
    db.on("child_added", (snap) => {
        notificationSound.play().catch(()=>{});
        renderCard(snap.key, snap.val());
    });

    db.on("child_removed", (snap) => {
        const el = document.getElementById(`msg-${snap.key}`);
        if(el) {
            el.classList.add('animate__animated', 'animate__fadeOutRight');
            setTimeout(() => el.remove(), 500);
        }
    });

    function renderCard(id, data) {
        const container = document.getElementById("msgs");
        const card = document.createElement("div");
        card.className = "msg-card";
        card.id = `msg-${id}`;
        card.dataset.txt = "";

        let html = `
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                <small style="color:var(--p); font-weight:800;">👤 ${data.dev}</small>
                <span class="trash" onclick="db.child('${id}').remove()">🗑️</span>
            </div>
            <small style="font-size:9px; color:#64748b; display:block; margin-bottom:8px;">Relay Time: ${data.time}</small>
        `;

        if(data.secure) {
            html += `
                <span class="badge-sec">🔒 OTP PROTECTED</span>
                <div class="bar-wrap"><div class="bar" id="bar-${id}"></div></div>
                <div id="lock-${id}" style="margin-top:12px; display:flex; gap:8px;">
                    <input id="in-${id}" placeholder="Enter OTP" style="margin:0; width:90px; padding:8px; font-size:12px;">
                    <button onclick="unlock('${id}','${data.otp}','${data.payload}',${data.exp})" style="padding:8px 15px; background:var(--s); color:white; border:none; border-radius:10px; cursor:pointer; font-size:11px; font-weight:bold;">Reveal</button>
                </div>
                <div id="show-${id}" style="display:none; margin-top:12px; font-weight:bold; color:var(--p); word-break:break-all; font-size:14px; background:rgba(0,0,0,0.2); padding:10px; border-radius:10px;"></div>
            `;
            handleTimer(id, data.exp);
        } else {
            const dec = CryptoJS.AES.decrypt(data.payload, MASTER_KEY).toString(CryptoJS.enc.Utf8);
            card.dataset.txt = dec.toLowerCase();
            html += `
                <div style="font-size:14px; word-break:break-all; line-height:1.5;">${dec}</div>
                <button onclick="copyToClip('${dec}')" style="background:var(--p); border:none; border-radius:6px; font-size:10px; padding:4px 10px; margin-top:10px; cursor:pointer; font-weight:bold; color:#000;">COPY TO CLIPBOARD</button>
            `;
        }
        card.innerHTML = html;
        container.prepend(card);
    }

    function handleTimer(id, exp) {
        const itv = setInterval(() => {
            const diff = exp - Date.now();
            if(diff <= 0) {
                clearInterval(itv);
                db.child(id).remove();
                return;
            }
            const bar = document.getElementById(`bar-${id}`);
            if(bar) bar.style.width = (diff/60000*100) + "%";
        }, 1000);
    }

    window.unlock = (id, correct, payload, exp) => {
        const val = document.getElementById(`in-${id}`).value;
        if(val === correct && Date.now() < exp) {
            if(navigator.vibrate) navigator.vibrate(50);
            const dec = CryptoJS.AES.decrypt(payload, MASTER_KEY).toString(CryptoJS.enc.Utf8);
            document.getElementById(`lock-${id}`).style.display="none";
            const display = document.getElementById(`show-${id}`);
            display.innerText = dec;
            display.style.display="block";
            document.getElementById(`msg-${id}`).dataset.txt = dec.toLowerCase();
        } else {
            alert("Security Alert: Invalid OTP or Expired Session");
        }
    };

    window.copyToClip = (txt) => {
        navigator.clipboard.writeText(txt);
        alert("Clipboard Synchronized!");
    };

    function searchMsgs() {
        const q = document.getElementById("search").value.toLowerCase();
        document.querySelectorAll('.msg-card').forEach(card => {
            const content = card.dataset.txt || "";
            card.style.display = content.includes(q) ? 'block' : 'none';
        });
    }
</script>
</body>
</html>
