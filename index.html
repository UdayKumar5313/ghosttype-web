<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostType Ultra | 2026 Platinum Build</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --p: #38bdf8; --s: #f472b6; --bg: #0f172a; --g: rgba(255,255,255,0.03); --b: rgba(255,255,255,0.08); --t: #f8fafc; }
        .light-mode { --bg: #f8fafc; --t: #0f172a; --g: rgba(0,0,0,0.05); --b: rgba(0,0,0,0.1); }
        
        body { background: var(--bg); color: var(--t); font-family: 'Inter', sans-serif; margin: 0; padding: 15px; min-height: 100vh; display: flex; justify-content: center; align-items: center; transition: 0.3s; }
        
        .glass { background: var(--g); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--b); border-radius: 32px; padding: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6); }
        #auth-container { width: 100%; max-width: 420px; text-align: center; }
        
        #app-container { display: none; width: 100%; max-width: 1000px; grid-template-columns: 1fr; gap: 25px; }
        @media (min-width: 768px) { #app-container { display: grid; grid-template-columns: 420px 1fr; align-items: start; } .sticky { position: sticky; top: 20px; } }

        input, textarea { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--b); color: var(--t); border-radius: 16px; padding: 16px; margin-bottom: 15px; box-sizing: border-box; font-size: 14px; transition: 0.4s; }
        .msg-card { background: var(--g); border: 1px solid var(--b); padding: 22px; margin-bottom: 20px; border-radius: 24px; position: relative; }
        .btn-p { background: linear-gradient(135deg, #38bdf8, #818cf8); color: #0f172a; border: none; padding: 18px; border-radius: 16px; font-weight: 900; width: 100%; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1.5px; }
        .btn-p:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(56, 189, 248, 0.3); }
        
        .feature-bar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .chip { font-size: 10px; padding: 5px 10px; border-radius: 20px; border: 1px solid var(--b); cursor: pointer; background: var(--g); }
        .bar-wrap { height: 5px; background: rgba(0,0,0,0.5); width: 100%; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .bar { height: 100%; background: linear-gradient(90deg, #f472b6, #fb7185); width: 100%; transition: width 1s linear; }
        .qr-area { background: white; padding: 10px; border-radius: 10px; display: inline-block; margin-top: 10px; }
        #search { margin-bottom: 20px; border-radius: 30px; }
    </style>
</head>
<body class="animate__animated animate__fadeIn">

    <div id="auth-container" class="glass animate__animated animate__zoomIn">
        <h1 id="auth-title" style="color: var(--p); margin-bottom: 5px; font-size: 32px;">GhostType</h1>
        <p style="font-size: 14px; color: #64748b; margin-bottom: 30px;">Military-Grade Sync Protocol</p>
        <input type="email" id="email" placeholder="Email ID">
        <input type="password" id="pass" placeholder="Password">
        <button id="auth-btn" class="btn-p" onclick="handleAuth()">Initialize Sync</button>
        <p id="toggle-link" style="font-size: 11px; color: #94a3b8; margin-top: 25px; cursor: pointer;" onclick="toggleMode()">New Node? Register Here</p>
        <p id="auth-error" style="color: #fb7185; font-size: 11px; margin-top: 15px;"></p>
    </div>

    <div id="app-container">
        <div class="sticky">
            <div class="glass animate__animated animate__fadeInLeft">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                    <h2 style="margin:0; font-size:18px; color:var(--p);">SYNC PANEL</h2>
                    <div style="display:flex; gap:10px;">
                        <button onclick="toggleTheme()" class="chip">🌓 THEME</button>
                        <button onclick="logout()" style="background:none; border: 1px solid #fb7185; color: #fb7185; font-size: 10px; padding: 5px 10px; border-radius: 10px; cursor: pointer;">LOGOUT</button>
                    </div>
                </div>
                
                <input id="deviceName" placeholder="👤 Identity (Laptop/Phone)" oninput="localStorage.setItem('gName', this.value)">
                
                <div class="feature-bar">
                    <button onclick="startVoice()" class="chip">🎤 VOICE</button>
                    <span id="charCount" class="chip">0 Chars</span>
                </div>

                <textarea id="textInput" placeholder="Paste text for cloud relay..." oninput="updateStats()"></textarea>
                
                <div style="font-size:12px; color:var(--p); margin-bottom:18px; display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <label style="cursor:pointer;"><input type="checkbox" id="isSec"> 🔒 OTP Layer</label>
                    <label style="cursor:pointer;"><input type="checkbox" id="isBurn"> 🔥 Burn on Read</label>
                    <label style="cursor:pointer;"><input type="checkbox" id="autoCopy"> 📋 Auto-Copy</label>
                </div>
                
                <button class="btn-p" onclick="sendData()">Encrypt & Push</button>
                <div id="otpDisplay" style="text-align:center; color:#fb7185; font-weight:bold; margin-top:20px; font-family: monospace; font-size: 22px;"></div>
                <div id="net-status" style="margin-top:20px; text-align:center; font-size:11px; color:#64748b;"><span class="status-dot"></span> <span id="ping">LATENCY: --ms</span></div>
            </div>
        </div>

        <div class="glass animate__animated animate__fadeInRight">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="margin:0; font-size:22px;">Relay</h2>
                <button onclick="purgeAll()" class="chip" style="color:#fb7185;">CLEAR ALL</button>
            </div>
            <input type="text" id="search" placeholder="🔍 Search relay content..." oninput="filterMsgs()">
            <div id="msgs"></div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDRsNoO7wS4tY9G_VFwRTsTDWwHaYbJGl4",
        authDomain: "ghosttype-67c57.firebaseapp.com",
        databaseURL: "https://ghosttype-67c57-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ghosttype-67c57",
        storageBucket: "ghosttype-67c57.firebasestorage.app",
        messagingSenderId: "965426759949",
        appId: "1:965426759949:web:08740170d41fda24478844"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database().ref("v7_master_sync");
    const MASTER_KEY = "GHOST_ULTRA_2026_KEY";
    const sound = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');

    let isLoginMode = true;

    function toggleTheme() { document.body.classList.toggle('light-mode'); }
    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById("auth-title").innerText = isLoginMode ? "GhostType" : "New Node";
        document.getElementById("auth-btn").innerText = isLoginMode ? "Initialize Sync" : "Register Node";
    }

    function handleAuth() {
        const email = document.getElementById('email').value, pass = document.getElementById('pass').value;
        if (isLoginMode) auth.signInWithEmailAndPassword(email, pass).catch(e => document.getElementById('auth-error').innerText = e.message);
        else auth.createUserWithEmailAndPassword(email, pass).catch(e => document.getElementById('auth-error').innerText = e.message);
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app-container').style.display = 'grid';
            initApp();
        } else {
            document.getElementById('auth-container').style.display = 'block';
            document.getElementById('app-container').style.display = 'none';
        }
    });

    function initApp() {
        document.getElementById("deviceName").value = localStorage.getItem('gName') || "";
        db.on("child_added", snap => renderCard(snap.key, snap.val()));
        db.on("child_removed", snap => {
            const el = document.getElementById(`msg-${snap.key}`);
            if(el) { el.classList.add('animate__animated', 'animate__zoomOut'); setTimeout(() => el.remove(), 500); }
        });
        
        setInterval(() => {
            const start = Date.now();
            db.child('.info/connected').once('value', () => {
                document.getElementById('ping').innerText = `LATENCY: ${Date.now() - start}ms`;
            });
        }, 5000);
    }

    function updateStats() {
        const val = document.getElementById("textInput").value;
        document.getElementById("charCount").innerText = `${val.length} Chars`;
    }

    function startVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.onresult = (e) => {
            document.getElementById("textInput").value += e.results[0][0].transcript;
            updateStats();
        };
        recognition.start();
    }

    function sendData() {
        const text = document.getElementById("textInput").value.trim();
        const dev = document.getElementById("deviceName").value || "Phantom_Node";
        const secure = document.getElementById("isSec").checked;
        const burn = document.getElementById("isBurn").checked;
        
        if(!text) return;

        const encrypted = CryptoJS.AES.encrypt(text, MASTER_KEY).toString();
        let otp = (secure || burn) ? Math.floor(100000 + Math.random()*900000).toString() : null;
        let exp = secure ? Date.now() + 60000 : null;

        if(otp) document.getElementById("otpDisplay").innerText = otp;
        db.push({ dev, payload: encrypted, secure, burn, otp, exp, time: new Date().toLocaleTimeString(), platform: navigator.platform });
        document.getElementById("textInput").value = "";
    }

    function renderCard(id, data) {
        sound.play().catch(()=>{});
        const container = document.getElementById("msgs");
        const card = document.createElement("div");
        card.className = "msg-card animate__animated animate__fadeInUp";
        card.id = `msg-${id}`;
        card.dataset.content = data.payload;

        let html = `<div style="display:flex; justify-content:space-between;">
                        <div><span class="chip">AES-256</span> ${data.burn ? '<span class="chip" style="color:#fb7185">🔥 BURN</span>' : ''}</div>
                        <span style="cursor:pointer; opacity:0.3;" onclick="db.child('${id}').remove()">🗑️</span>
                    </div>
                    <div style="margin:10px 0;"><small style="color:var(--p); font-weight:900;">👤 ${data.dev} • ${data.time}</small></div>`;

        if(data.secure || data.burn) {
            html += `<div id="lock-${id}">
                        <input id="in-${id}" placeholder="Enter OTP" style="width:120px; padding:10px;">
                        <button onclick="unlock('${id}','${data.otp}','${data.payload}',${data.exp},${data.burn})" class="chip">DECRYPT</button>
                     </div><div id="show-${id}" style="display:none; word-break:break-all;"></div>`;
            if(data.secure) handleTimer(id, data.exp);
        } else {
            const dec = CryptoJS.AES.decrypt(data.payload, MASTER_KEY).toString(CryptoJS.enc.Utf8);
            html += `<div style="font-size:15px; word-break:break-all;">${dec}</div>
                     <div style="margin-top:10px; display:flex; gap:10px;">
                        <button onclick="copyTo('${dec}')" class="chip">COPY</button>
                        <button onclick="genQR('${id}','${dec}')" class="chip">QR</button>
                     </div><div id="qr-${id}" class="qr-area" style="display:none"></div>`;
            if(document.getElementById('autoCopy').checked) copyTo(dec);
        }
        card.innerHTML = html;
        container.prepend(card);
    }

    function genQR(id, text) {
        const el = document.getElementById(`qr-${id}`);
        el.style.display = 'block';
        el.innerHTML = "";
        new QRCode(el, { text: text, width: 128, height: 128 });
    }

    function filterMsgs() {
        const term = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.msg-card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(term) ? 'block' : 'none';
        });
    }

    function purgeAll() { if(confirm("Purge entire relay?")) db.remove(); }

    function handleTimer(id, exp) {
        const itv = setInterval(() => {
            const diff = exp - Date.now();
            if(diff <= 0) { clearInterval(itv); db.child(id).remove(); return; }
            const b = document.getElementById(`bar-${id}`);
            if(b) b.style.width = (diff/60000*100) + "%";
        }, 1000);
    }

    window.unlock = (id, correct, payload, exp, burn) => {
        const val = document.getElementById(`in-${id}`).value;
        if(val === correct) {
            const dec = CryptoJS.AES.decrypt(payload, MASTER_KEY).toString(CryptoJS.enc.Utf8);
            document.getElementById(`lock-${id}`).style.display="none";
            const display = document.getElementById(`show-${id}`);
            display.innerText = dec;
            display.style.display="block";
            copyTo(dec);
            if(burn) db.child(id).remove();
        }
    };

    window.copyTo = (txt) => { navigator.clipboard.writeText(txt); };
</script>
</body>
</html>
