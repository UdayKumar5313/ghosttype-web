<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GhostType Ultra | Premium Sync</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --primary: #38bdf8;
            --accent: #f472b6;
            --bg: #0f172a;
            --card-bg: #1e293b;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            min-height: 100vh;
        }

        .card { 
            background: var(--card-bg); 
            width: 100%; 
            max-width: 450px; 
            padding: 25px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
            transition: all 0.3s ease;
        }

        h1 { color: var(--primary); text-align: center; margin-bottom: 20px; letter-spacing: -1px; }

        input, textarea { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 10px; 
            background: rgba(15, 23, 42, 0.8); 
            border: 1px solid #334155; 
            color: white; 
            border-radius: 12px; 
            box-sizing: border-box;
            transition: border 0.3s ease, box-shadow 0.3s ease;
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
            outline: none;
        }

        textarea { height: 100px; font-size: 14px; resize: none; }

        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }

        button { 
            background: var(--primary); 
            color: #0f172a; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
            transition: transform 0.2s ease, background 0.3s ease;
        }

        button:hover { 
            background: #7dd3fc; 
            transform: translateY(-2px);
        }

        button:active { transform: translateY(0); }

        #otpAlert { 
            color: var(--accent); 
            font-weight: bold; 
            text-align: center; 
            margin-bottom: 10px; 
            font-family: 'Courier New', monospace; 
            min-height: 20px; 
        }

        .msg-card { 
            background: rgba(255,255,255,0.03); 
            padding: 15px; 
            margin-top: 15px; 
            border-radius: 15px; 
            border-left: 4px solid var(--primary); 
            word-wrap: break-word;
            backdrop-filter: blur(5px);
        }

        .secure { border-left-color: var(--accent); background: rgba(244, 114, 182, 0.05); }

        #status-bar { font-size: 11px; color: #4ade80; margin-top: 10px; font-weight: 500; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>

<div class="card animate__animated animate__fadeInDown">
    <h1>GHOSTTYPE <span style="font-size: 12px; color: #94a3b8; font-weight: 300;">ULTRA</span></h1>
    
    <input type="text" id="deviceName" placeholder="👤 Identity (e.g. Uday's Laptop)">
    <textarea id="textInput" placeholder="Paste sensitive text here..."></textarea>
    
    <div class="row">
        <label style="font-size: 13px; cursor: pointer; display: flex; align-items: center;">
            <input type="checkbox" id="secureCheck" style="width: auto; margin-right: 8px; margin-bottom: 0;"> 🔒 OTP Lock
        </label>
    </div>
    
    <button id="mainSendBtn">Sync Clipboard Now</button>
    
    <div id="otpAlert" class="animate__animated"></div>
    <div id="status-bar">Connecting to Cloud...</div>
    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">
    <div id="messages"></div>
</div>



<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDRsNoO7wS4tY9G_VFwRTsTDWwHaYbJGl4",
        authDomain: "ghosttype-67c57.firebaseapp.com",
        databaseURL: "https://ghosttype-67c57-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ghosttype-67c57",
        storageBucket: "ghosttype-67c57.firebasestorage.app",
        messagingSenderId: "965426759949",
        appId: "1:965426759949:web:08740170d41fda24478844"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("v4_stable_sync");
    const MASTER_KEY = "GHOST_KEY_2026";

    document.addEventListener("DOMContentLoaded", () => {
        const sendBtn = document.getElementById("mainSendBtn");
        const status = document.getElementById("status-bar");
        const otpAlert = document.getElementById("otpAlert");
        
        status.innerText = "Cloud Securely Connected ✅";

        sendBtn.addEventListener("click", () => {
            const devEl = document.getElementById("deviceName");
            const txtEl = document.getElementById("textInput");
            const secEl = document.getElementById("secureCheck");

            const device = devEl.value || "Hidden Device";
            const textContent = txtEl.value.trim();

            if (!textContent) {
                alert("Clipboard is empty!");
                return;
            }

            status.innerText = "Encrypting Data...";

            const encrypted = CryptoJS.AES.encrypt(textContent, MASTER_KEY).toString();
            
            let otp = null;
            let expiry = null;

            if (secEl.checked) {
                otp = Math.floor(100000 + Math.random() * 900000).toString();
                expiry = Date.now() + 60000;
                otpAlert.innerText = "YOUR SECURE OTP: " + otp;
                otpAlert.classList.add('animate__shakeX');
                setTimeout(() => otpAlert.classList.remove('animate__shakeX'), 1000);
            } else {
                otpAlert.innerText = "";
            }

            db.push({
                device,
                payload: encrypted,
                isSecure: secEl.checked,
                otp,
                expiry,
                time: new Date().toLocaleTimeString()
            }).then(() => {
                status.innerText = "Sync Successful! 🚀";
                txtEl.value = "";
                setTimeout(() => { status.innerText = "Cloud Securely Connected ✅"; }, 2000);
            });
        });

        db.on("child_added", (snap) => {
            const data = snap.val();
            const id = snap.key;

            const div = document.createElement("div");
            div.className = `msg-card animate__animated animate__fadeInUp ${data.isSecure ? 'secure' : ''}`;
            div.id = `card-${id}`;

            let html = `<small style="color:#94a3b8; font-weight: 600;">${data.device} • ${data.time}</small>`;

            if (data.isSecure) {
                html += `
                    <div id="lock-${id}">
                        <p style="margin:8px 0; color:#f472b6; font-size: 14px;">🔒 Locked Content (<span id="timer-${id}">60</span>s)</p>
                        <div style="display:flex; gap:8px;">
                            <input type="text" id="otp-in-${id}" placeholder="OTP" style="width:80px; padding:8px; margin:0;">
                            <button style="width:auto; padding:8px 15px; font-size: 12px;" onclick="unlock('${id}', '${data.otp}', '${data.payload}', ${data.expiry})">Unlock</button>
                        </div>
                    </div>
                    <div id="show-${id}" class="animate__animated animate__fadeIn" style="display:none; color:#38bdf8; font-weight:bold; margin-top:10px; white-space: pre-wrap;"></div>
                `;
                runTimer(id, data.expiry);
            } else {
                const bytes = CryptoJS.AES.decrypt(data.payload, MASTER_KEY);
                const original = bytes.toString(CryptoJS.enc.Utf8);
                html += `<div style="margin-top:8px; white-space: pre-wrap; font-size: 14px;">${original}</div>`;
            }

            div.innerHTML = html;
            document.getElementById("messages").prepend(div);
        });

        // Listen for deletions to trigger fadeOut
        db.on("child_removed", (snap) => {
            const card = document.getElementById(`card-${snap.key}`);
            if (card) {
                card.classList.remove('animate__fadeInUp');
                card.classList.add('animate__fadeOutLeft');
                setTimeout(() => card.remove(), 500);
            }
        });
    });

    function runTimer(id, expiry) {
        const timerTask = setInterval(() => {
            const diff = expiry - Date.now();
            const tDisplay = document.getElementById(`timer-${id}`);
            
            if (diff <= 0) {
                clearInterval(timerTask);
                db.child(id).remove(); // This triggers child_removed animation
                return;
            }
            const s = Math.floor((diff % 60000) / 1000);
            if (tDisplay) tDisplay.innerText = s;
        }, 1000);
    }

    window.unlock = function(id, correct, payload, expiry) {
        const entered = document.getElementById(`otp-in-${id}`).value;
        if (Date.now() > expiry) return alert("OTP Expired!");
        
        if (entered === correct) {
            const bytes = CryptoJS.AES.decrypt(payload, MASTER_KEY);
            document.getElementById(`lock-${id}`).style.display = "none";
            const display = document.getElementById(`show-${id}`);
            display.innerText = bytes.toString(CryptoJS.enc.Utf8);
            display.style.display = "block";
        } else {
            const btn = event.target;
            btn.classList.add('animate__animated', 'animate__headShake');
            setTimeout(() => btn.classList.remove('animate__headShake'), 500);
            alert("Incorrect OTP!");
        }
    };
</script>

</body>
</html>
