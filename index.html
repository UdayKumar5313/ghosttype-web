<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostType | SOC-Grade Relay</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        :root { --p: #00f2ff; --s: #7000ff; --bg: #050505; --card: rgba(20, 20, 25, 0.8); --b: rgba(0, 242, 255, 0.2); --t: #e2e8f0; }
        body { background: #000; color: var(--t); font-family: 'JetBrains Mono', 'Fira Code', monospace; margin: 0; padding: 15px; min-height: 100vh; overflow-x: hidden; }
        
        /* Cyber-Grid Background */
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; }

        .glass { background: var(--card); backdrop-filter: blur(15px); border: 1px solid var(--b); border-radius: 12px; padding: 25px; box-shadow: 0 0 30px rgba(0, 242, 255, 0.1); }
        
        #auth-container { width: 100%; max-width: 400px; margin: 100px auto; text-align: center; border-top: 4px solid var(--p); }
        #app-container { display: none; width: 100%; max-width: 1200px; margin: 0 auto; grid-template-columns: 350px 1fr 250px; gap: 20px; }
        
        @media (max-width: 1000px) { #app-container { grid-template-columns: 1fr; } .soc-sidebar { display: none; } }

        input, textarea { width: 100%; background: #000; border: 1px solid var(--b); color: var(--p); border-radius: 4px; padding: 12px; margin-bottom: 15px; box-sizing: border-box; font-family: inherit; }
        input:focus { border-color: var(--p); outline: none; box-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }
        
        .btn-p { background: var(--p); color: #000; border: none; padding: 15px; border-radius: 4px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-p:hover { filter: brightness(1.2); letter-spacing: 1px; }

        .msg-card { background: rgba(0,0,0,0.6); border-left: 4px solid var(--p); padding: 15px; margin-bottom: 15px; position: relative; }
        .msg-card.secure-type { border-left-color: #ff0055; }
        
        .timer-bar { height: 2px; background: #ff0055; width: 100%; margin-top: 10px; transition: width 1s linear; }
        .audit-log { font-size: 10px; color: #666; height: 400px; overflow-y: auto; line-height: 1.4; }
        .audit-entry { border-bottom: 1px solid #222; padding: 5px 0; }
        .tag { font-size: 9px; padding: 2px 6px; background: #111; border: 1px solid #333; border-radius: 3px; margin-right: 5px; }
    </style>
</head>
<body>

    <div id="auth-container" class="glass animate__animated animate__fadeInDown">
        <h1 style="letter-spacing: 5px; color: var(--p);">GHOST_TYPE</h1>
        <p style="font-size: 10px; color: #555; margin-bottom: 20px;">V2.0.0 SECURE RELAY PROTOCOL</p>
        <input type="email" id="email" placeholder="OPERATOR ID (EMAIL)">
        <input type="password" id="pass" placeholder="ACCESS KEY (PASSWORD)">
        <button class="btn-p" onclick="handleAuth()">Establish Connection</button>
        <p id="toggle-link" style="font-size: 10px; color: #444; margin-top: 20px; cursor: pointer;" onclick="toggleMode()">UNREGISTERED NODE? REQUEST ACCESS</p>
    </div>

    <div id="app-container">
        <div class="glass animate__animated animate__fadeInLeft">
            <h3 style="color: var(--p); font-size: 14px; border-bottom: 1px solid var(--b); padding-bottom: 10px;">TERMINAL_INPUT</h3>
            <input id="deviceName" placeholder="NODE_ID (e.g. Kali_VM)">
            <textarea id="textInput" rows="5" placeholder="Enter payload for encryption..."></textarea>
            
            <div style="font-size: 11px; margin-bottom: 15px;">
                <label style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="isSec" style="width: auto; margin: 0;"> 
                    <span style="color: #ff0055;">ACTIVATE TEMPORAL OTP (60s)</span>
                </label>
            </div>
            
            <button class="btn-p" onclick="sendData()">Encrypt & Broadcast</button>
            <div id="otpDisplay" style="text-align:center; color:#ff0055; font-size: 24px; margin-top:15px; letter-spacing: 4px;"></div>
            <button onclick="logout()" style="width:100%; background:none; border:1px solid #333; color:#555; margin-top:20px; cursor:pointer; padding:5px;">TERMINATE SESSION</button>
        </div>

        <div class="glass" style="min-height: 70vh;">
            <h3 style="font-size: 14px; margin-top: 0;">ENCRYPTED_RELAY_STREAM</h3>
            <div id="msgs"></div>
        </div>

        <div class="glass soc-sidebar">
            <h3 style="font-size: 12px; color: var(--p);">SOC_AUDIT_LOG</h3>
            <div class="audit-log" id="auditLog"></div>
        </div>
    </div>

<script>
    // Config: Updated for your project
    const firebaseConfig = {
        apiKey: "AIzaSyDRsNoO7wS4tY9G_VFwRTsTDWwHaYbJGl4",
        authDomain: "ghosttype-67c57.firebaseapp.com",
        databaseURL: "https://ghosttype-67c57-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ghosttype-67c57",
        storageBucket: "ghosttype-67c57.firebasestorage.app",
        messagingSenderId: "965426759949",
        appId: "1:965426759949:web:08740170d41fda24478844"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database().ref("v8_hardened_relay");
    
    let sessionKey = "GHOST_DEFAULT"; // Will be updated on login
    let isLoginMode = true;

    function logSOC(action, status) {
        const log = document.getElementById('auditLog');
        const entry = document.createElement('div');
        entry.className = 'audit-entry';
        entry.innerHTML = `<span style="color:var(--p)">[${new Date().toLocaleTimeString()}]</span> ${action} <span style="color:${status==='OK'?'#4ade80':'#ff0055'}">${status}</span>`;
        log.prepend(entry);
    }

    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.querySelector('#auth-container h1').innerText = isLoginMode ? "GHOST_TYPE" : "NEW_NODE";
    }

    function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        sessionKey = CryptoJS.SHA256(pass + email).toString(); // Deriving key from creds
        
        if (isLoginMode) {
            auth.signInWithEmailAndPassword(email, pass).then(() => logSOC("Auth established", "OK")).catch(e => alert(e.message));
        } else {
            auth.createUserWithEmailAndPassword(email, pass).then(() => logSOC("Node registered", "OK")).catch(e => alert(e.message));
        }
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app-container').style.display = 'grid';
            initApp();
        }
    });

    function initApp() {
        document.getElementById("deviceName").value = localStorage.getItem('gName') || "Node_" + Math.floor(Math.random()*999);
        db.on("child_added", snap => renderCard(snap.key, snap.val()));
        db.on("child_removed", snap => document.getElementById(`msg-${snap.key}`)?.remove());
        logSOC("Sync Engine Initialized", "OK");
    }

    function sendData() {
        const text = document.getElementById("textInput").value.trim();
        const dev = document.getElementById("deviceName").value;
        const secure = document.getElementById("isSec").checked;
        if(!text) return;

        // AES Encryption using the derived session key
        const encrypted = CryptoJS.AES.encrypt(text, sessionKey).toString();
        let otp = secure ? Math.floor(100000 + Math.random()*900000).toString() : null;
        let exp = secure ? Date.now() + 60000 : null;

        if(secure) document.getElementById("otpDisplay").innerText = otp;
        
        db.push({ dev, payload: encrypted, secure, otp, exp, time: new Date().toLocaleTimeString() });
        document.getElementById("textInput").value = "";
        logSOC(`Payload sent from ${dev}`, "OK");
    }

    function renderCard(id, data) {
        const container = document.getElementById("msgs");
        const card = document.createElement("div");
        card.className = `msg-card ${data.secure ? 'secure-type' : ''} animate__animated animate__fadeIn`;
        card.id = `msg-${id}`;

        let html = `
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span style="font-size:10px; color:#555;">ID: ${id.substring(1,8)}</span>
                <span style="cursor:pointer;" onclick="db.child('${id}').remove()">[X]</span>
            </div>
            <div style="margin-bottom:10px;">
                <span class="tag">AES-256</span>
                <span style="color:var(--p); font-weight:bold; font-size:12px;">@${data.dev}</span>
                <span style="font-size:10px; color:#444; margin-left:10px;">${data.time}</span>
            </div>
        `;

        if(data.secure) {
            html += `
                <div id="lock-${id}">
                    <input id="in-${id}" placeholder="ENTER_OTP" style="width:120px; margin:0; border-color:#ff0055;">
                    <button onclick="unlock('${id}','${data.otp}','${data.payload}',${data.exp})" class="btn-p" style="width:auto; padding:8px 15px; background:#ff0055;">DECRYPT</button>
                    <div class="timer-bar" id="bar-${id}"></div>
                </div>
                <div id="show-${id}" style="display:none; color:var(--p); word-break:break-all; font-size:13px; background:#111; padding:10px; border:1px solid #222;"></div>
            `;
            handleTimer(id, data.exp);
        } else {
            try {
                const dec = CryptoJS.AES.decrypt(data.payload, sessionKey).toString(CryptoJS.enc.Utf8);
                html += `<div style="font-size:14px; color:#fff;">${dec || "[ENCRYPTION_MISMATCH]"}</div>`;
            } catch(e) {
                html += `<div style="color:#ff0055;">[KEY_ERROR]</div>`;
            }
        }
        
        card.innerHTML = html;
        container.prepend(card);
    }

    function handleTimer(id, exp) {
        const itv = setInterval(() => {
            const diff = exp - Date.now();
            const b = document.getElementById(`bar-${id}`);
            if(diff <= 0) { clearInterval(itv); db.child(id).remove(); return; }
            if(b) b.style.width = (diff/60000*100) + "%";
        }, 1000);
    }

    window.unlock = (id, correct, payload, exp) => {
        const val = document.getElementById(`in-${id}`).value;
        if(val === correct && Date.now() < exp) {
            const dec = CryptoJS.AES.decrypt(payload, sessionKey).toString(CryptoJS.enc.Utf8);
            document.getElementById(`lock-${id}`).style.display="none";
            const display = document.getElementById(`show-${id}`);
            display.innerText = dec;
            display.style.display="block";
            logSOC(`Manual Decryption @ ${id.substring(1,8)}`, "OK");
        } else {
            logSOC(`Unauthorized attempt @ ${id.substring(1,8)}`, "FAIL");
            alert("ACCESS_DENIED");
        }
    };
</script>
</body>
</html>
