<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GhostType Ultra | Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        :root { --primary: #38bdf8; --danger: #f43f5e; --bg: #0f172a; --card-bg: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Glassmorphism Card */
        .card { 
            background: var(--card-bg); width: 100%; max-width: 480px; padding: 30px; 
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
        }

        h1 { color: var(--primary); text-align: center; font-size: 24px; margin-bottom: 25px; letter-spacing: -1px; }

        input, textarea { 
            width: 100%; padding: 14px; margin-bottom: 12px; background: rgba(15, 23, 42, 0.8); 
            border: 1px solid #334155; color: white; border-radius: 12px; box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }

        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        button { 
            background: var(--primary); color: #0f172a; border: none; padding: 14px; 
            border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%;
            transition: transform 0.2s, background 0.3s;
        }
        button:hover { background: #7dd3fc; transform: translateY(-2px); }
        button:active { transform: translateY(0); }

        #messages { margin-top: 20px; max-height: 400px; overflow-y: auto; padding-right: 5px; }
        
        /* Message Card Animations */
        .msg-card { 
            background: rgba(255,255,255,0.03); padding: 18px; margin-bottom: 15px; 
            border-radius: 15px; border-left: 4px solid var(--primary); 
            position: relative; transition: 0.3s;
        }
        .secure { border-left-color: #f472b6; background: rgba(244, 114, 182, 0.05); }

        /* Delete Icon */
        .delete-btn {
            position: absolute; top: 15px; right: 15px; background: transparent;
            color: #64748b; font-size: 18px; cursor: pointer; width: auto; padding: 0;
        }
        .delete-btn:hover { color: var(--danger); transform: none; }

        .meta { font-size: 11px; color: #94a3b8; margin-bottom: 8px; }
        #otpAlert { color: #f472b6; font-weight: bold; text-align: center; font-family: monospace; min-height: 24px; }
        #status { font-size: 10px; color: #4ade80; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card animate__animated animate__fadeInDown">
    <h1>GHOSTTYPE <span style="font-weight: 300;">ULTRA</span></h1>
    
    <input type="text" id="deviceName" placeholder="👤 Identity (e.g. Uday's Laptop)">
    <textarea id="textInput" placeholder="Paste sensitive data..."></textarea>
    
    <div class="row">
        <label style="font-size: 13px; cursor: pointer; display: flex; align-items: center;">
            <input type="checkbox" id="secureCheck" style="width: auto; margin-right: 8px; margin-bottom: 0;"> 🔒 OTP Encryption
        </label>
    </div>
    
    <button id="mainSendBtn">⚡ Sync Clipboard</button>
    
    <div id="otpAlert"></div>
    <div id="status">Secure Connection Active ✅</div>
    
    <div id="messages"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDRsNoO7wS4tY9G_VFwRTsTDWwHaYbJGl4",
        authDomain: "ghosttype-67c57.firebaseapp.com",
        databaseURL: "https://ghosttype-67c57-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ghosttype-67c57",
        storageBucket: "ghosttype-67c57.firebasestorage.app",
        messagingSenderId: "965426759949",
        appId: "1:965426759949:web:08740170d41fda24478844"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("v5_premium_sync");
    const MASTER_KEY = "GHOST_KEY_2026";

    document.addEventListener("DOMContentLoaded", () => {
        const sendBtn = document.getElementById("mainSendBtn");
        const otpAlert = document.getElementById("otpAlert");

        // --- SEND LOGIC ---
        sendBtn.addEventListener("click", () => {
            const text = document.getElementById("textInput").value.trim();
            const device = document.getElementById("deviceName").value || "Unknown Device";
            const isSecure = document.getElementById("secureCheck").checked;

            if (!text) return alert("Please enter text!");

            // AES Encryption
            const encrypted = CryptoJS.AES.encrypt(text, MASTER_KEY).toString();
            let otp = null; let expiry = null;

            if (isSecure) {
                otp = Math.floor(100000 + Math.random() * 900000).toString();
                expiry = Date.now() + 60000;
                otpAlert.innerText = "ONE-TIME PASS: " + otp;
            } else {
                otpAlert.innerText = "";
            }

            db.push({
                device, payload: encrypted, isSecure, otp, expiry, time: new Date().toLocaleTimeString()
            });

            document.getElementById("textInput").value = "";
        });

        // --- RECEIVE LOGIC ---
        db.on("child_added", (snap) => {
            const data = snap.val();
            const id = snap.key;
            createMessageCard(id, data);
        });

        // --- DELETE LOGIC ---
        db.on("child_removed", (snap) => {
            const card = document.getElementById(`card-${snap.key}`);
            if (card) {
                card.classList.add('animate__animated', 'animate__fadeOutRight');
                setTimeout(() => card.remove(), 500);
            }
        });
    });

    function createMessageCard(id, data) {
        const list = document.getElementById("messages");
        const div = document.createElement("div");
        div.id = `card-${id}`;
        div.className = `msg-card animate__animated animate__fadeInUp ${data.isSecure ? 'secure' : ''}`;

        let bodyHtml = `<div class="meta">${data.device} • ${data.time}</div>`;
        bodyHtml += `<span class="delete-btn" onclick="deleteMsg('${id}')">🗑️</span>`;

        if (data.isSecure) {
            bodyHtml += `
                <div id="lock-${id}">
                    <p style="color:#f472b6; margin:5px 0;">🔒 Locked (Expires in <span id="timer-${id}">60</span>s)</p>
                    <input type="text" id="otp-in-${id}" placeholder="OTP" style="width:80px; padding:5px; margin:0;">
                    <button style="width:auto; padding:5px 10px; font-size:12px;" onclick="unlock('${id}', '${data.otp}', '${data.payload}', ${data.expiry})">Unlock</button>
                </div>
                <div id="show-${id}" style="display:none; color:#38bdf8; font-weight:bold; margin-top:10px;"></div>
            `;
            startExpiryTimer(id, data.expiry);
        } else {
            const original = CryptoJS.AES.decrypt(data.payload, MASTER_KEY).toString(CryptoJS.enc.Utf8);
            bodyHtml += `<div style="word-break:break-all;">${original}</div>`;
        }

        div.innerHTML = bodyHtml;
        list.prepend(div);
    }

    function startExpiryTimer(id, expiry) {
        const t = setInterval(() => {
            const diff = expiry - Date.now();
            if (diff <= 0) {
                clearInterval(t);
                deleteMsg(id); // Auto-delete on timeout
                return;
            }
            const display = document.getElementById(`timer-${id}`);
            if (display) display.innerText = Math.floor(diff/1000);
        }, 1000);
    }

    window.deleteMsg = (id) => {
        db.child(id).remove();
    };

    window.unlock = function(id, correct, payload, expiry) {
        const entered = document.getElementById(`otp-in-${id}`).value;
        if (entered === correct) {
            const dec = CryptoJS.AES.decrypt(payload, MASTER_KEY).toString(CryptoJS.enc.Utf8);
            document.getElementById(`lock-${id}`).style.display = "none";
            document.getElementById(`show-${id}`).innerText = dec;
            document.getElementById(`show-${id}`).style.display = "block";
        } else {
            alert("Wrong OTP!");
        }
    };
</script>

</body>
</html>
