<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostType Ultra | Multi-Node Identity</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        :root { --p: #38bdf8; --s: #f472b6; --bg: #020617; --g: rgba(255,255,255,0.03); --b: rgba(255,255,255,0.08); --t: #f8fafc; }
        
        body { background: #020617; color: var(--t); font-family: 'Inter', sans-serif; margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); }

        .container { width: 100%; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 20px; padding: 20px; box-sizing: border-box; }
        @media (min-width: 992px) { .container { grid-template-columns: 400px 1fr; padding: 40px; gap: 40px; } .sticky-panel { position: sticky; top: 40px; } }

        .glass { background: var(--g); backdrop-filter: blur(20px); border: 1px solid var(--b); border-radius: 28px; padding: clamp(15px, 5vw, 30px); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6); }

        /* USER IDENTITY STYLES */
        .user-profile { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 20px; border: 1px solid var(--b); }
        .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; text-transform: uppercase; font-size: 18px; box-shadow: 0 0 15px rgba(0,0,0,0.3); }
        .user-email { font-size: 12px; opacity: 0.8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        input, textarea { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--b); color: var(--t); border-radius: 14px; padding: 14px; margin-bottom: 12px; box-sizing: border-box; font-size: 14px; transition: 0.3s; }
        .btn-p { background: linear-gradient(135deg, #38bdf8, #818cf8); color: #0f172a; border: none; padding: 16px; border-radius: 14px; font-weight: 900; width: 100%; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }

        .msg-card { background: rgba(255,255,255,0.02); border: 1px solid var(--b); padding: 20px; margin-bottom: 20px; border-radius: 24px; position: relative; }
        .bar-wrap { height: 4px; background: rgba(0,0,0,0.5); width: 100%; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .bar { height: 100%; background: var(--s); width: 100%; transition: width 1s linear; }

        .pass-wrapper { position: relative; width: 100%; margin-bottom: 12px; }
        .toggle-pass { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; opacity: 0.6; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="auth-container" class="glass animate__animated animate__zoomIn" style="width: 100%; max-width: 400px; margin: 15vh auto; text-align: center;">
        <h1 style="color: var(--p); font-size: 28px; margin-bottom: 10px;">GhostType</h1>
        <p style="font-size: 13px; color: #64748b; margin-bottom: 25px;">Encrypted Node Access</p>
        <input type="email" id="email" placeholder="Email">
        <div class="pass-wrapper">
            <input type="password" id="pass" placeholder="Password">
            <span class="toggle-pass" onclick="togglePassword()">👁️</span>
        </div>
        <button class="btn-p" onclick="handleAuth()">Enter Terminal</button>
        <p style="font-size: 11px; margin-top: 15px; cursor: pointer; opacity: 0.6;" onclick="toggleMode()">Request Registration</p>
    </div>

    <div id="app-container" class="container" style="display: none;">
        <div class="sticky-panel">
            <div class="glass animate__animated animate__fadeInLeft">
                <div class="user-profile">
                    <div id="user-avatar" class="avatar">?</div>
                    <div style="flex:1; overflow:hidden;">
                        <div id="user-display-email" class="user-email">Loading...</div>
                        <div style="font-size:9px; color:var(--p); font-weight:bold;">ENCRYPTION ACTIVE</div>
                    </div>
                    <button onclick="logout()" style="background:none; border: 1px solid #fb7185; color: #fb7185; font-size: 9px; padding: 4px 8px; border-radius: 8px; cursor: pointer;">EXIT</button>
                </div>

                <input id="deviceName" placeholder="👤 Identity (e.g. Hyderabad_Node)">
                <textarea id="textInput" placeholder="Paste sensitive data..."></textarea>
                
                <div style="display:flex; gap:10px; margin-bottom:12px;">
                    <input type="number" id="timerInput" value="60" style="margin:0; flex:2;" placeholder="Secs">
                    <label style="flex:1; display:flex; align-items:center; background:rgba(0,0,0,0.3); border-radius:12px; padding:0 10px; border:1px solid var(--b);">
                        <input type="checkbox" id="isSec" style="width:15px;"> 🔒
                    </label>
                </div>

                <button class="btn-p" onclick="sendData()">Encrypt & Push</button>
                <div id="otpDisplay" style="text-align:center; color:#fb7185; font-weight:bold; margin-top:15px; font-family: monospace; font-size: 20px;"></div>
            </div>
        </div>

        <div class="history-section">
            <h2 style="margin: 0 0 20px 0; font-size: 20px; color: var(--p);">Relay Stream</h2>
            <div id="msgs"></div>
        </div>
    </div>

<script>
    // --- HELPER: COLOR HASHING ---
    function stringToColor(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            hash = str.charCodeAt(i) + ((hash << 5) - hash);
        }
        let color = '#';
        for (let i = 0; i < 3; i++) {
            let value = (hash >> (i * 8)) & 0xFF;
            color += ('00' + value.toString(16)).substr(-2);
        }
        return color;
    }

    function togglePassword() {
        const p = document.getElementById('pass');
        p.type = p.type === 'password' ? 'text' : 'password';
    }

    // Firebase Setup
    const firebaseConfig = {
        apiKey: "AIzaSyDRsNoO7wS4tY9G_VFwRTsTDWwHaYbJGl4",
        authDomain: "ghosttype-67c57.firebaseapp.com",
        databaseURL: "https://ghosttype-67c57-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ghosttype-67c57"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database().ref("v7_master_sync");
    const KEY = "GHOST_ULTRA_2026_KEY";

    let isLogin = true;
    function toggleMode() { isLogin = !isLogin; document.querySelector('#auth-container h1').innerText = isLogin ? "GhostType" : "Register Node"; }
    function handleAuth() {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(isLogin) auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
        else auth.createUserWithEmailAndPassword(e, p).catch(err => alert(err.message));
    }
    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app-container').style.display = 'grid';
            
            // Set User Identity UI
            const userColor = stringToColor(user.email);
            const avatar = document.getElementById('user-avatar');
            avatar.style.backgroundColor = userColor;
            avatar.innerText = user.email.charAt(0);
            document.getElementById('user-display-email').innerText = user.email;
            
            init(user.email, userColor);
        }
    });

    function init(currentUserEmail, currentUserColor) {
        document.getElementById("deviceName").value = localStorage.getItem('gName') || "";
        db.on("child_added", snap => render(snap.key, snap.val(), currentUserEmail));
        db.on("child_removed", snap => { document.getElementById(`msg-${snap.key}`)?.remove(); });
    }

    function sendData() {
        const txt = document.getElementById("textInput").value.trim();
        const dev = document.getElementById("deviceName").value || "Node";
        const sec = document.getElementById("isSec").checked;
        const timerVal = parseInt(document.getElementById("timerInput").value) || 60;
        
        if(!txt) return;
        localStorage.setItem('gName', dev);

        const enc = CryptoJS.AES.encrypt(txt, KEY).toString();
        let otp = sec ? Math.floor(100000 + Math.random()*900000).toString() : null;
        let exp = sec ? Date.now() + (timerVal * 1000) : null;

        if(sec) document.getElementById("otpDisplay").innerText = otp;
        db.push({ 
            dev, 
            payload: enc, 
            secure: sec, 
            otp, 
            exp, 
            duration: timerVal, 
            sender: auth.currentUser.email,
            senderColor: stringToColor(auth.currentUser.email),
            time: new Date().toLocaleTimeString() 
        });
        document.getElementById("textInput").value = "";
    }

    function render(id, data, myEmail) {
        const card = document.createElement("div");
        card.className = "msg-card animate__animated animate__fadeInUp";
        card.id = `msg-${id}`;
        
        // Identity Badge for each message
        let h = `<div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <div style="width:10px; height:10px; border-radius:50%; background:${data.senderColor}"></div>
                        <small style="color:var(--p); font-weight:bold;">${data.dev} <span style="opacity:0.5; font-weight:normal;">(${data.sender})</span></small>
                    </div>
                    <span style="cursor:pointer; opacity:0.3" onclick="db.child('${id}').remove()">🗑️</span>
                 </div>
                 <div style="font-size:9px; margin: 4px 0 10px 18px; opacity:0.6;">Relay Time: ${data.time}</div>`;

        if(data.secure) {
            h += `<div class="bar-wrap"><div class="bar" id="bar-${id}"></div></div>
                  <div id="l-${id}" style="margin-top:10px; display:flex; gap:10px;">
                    <input id="i-${id}" placeholder="OTP" style="margin:0; width:80px; padding:8px;">
                    <button onclick="unlock('${id}','${data.otp}','${data.payload}',${data.exp})" style="padding:8px; background:var(--s); color:white; border:none; border-radius:10px; cursor:pointer; font-size:11px;">Unlock</button>
                  </div><div id="s-${id}" style="display:none; margin-top:10px; font-weight:bold; color:var(--p); word-break:break-all;"></div>`;
            timer(id, data.exp, data.duration);
        } else {
            const dec = CryptoJS.AES.decrypt(data.payload, KEY).toString(CryptoJS.enc.Utf8);
            h += `<div style="margin-top:10px; font-size:14px; padding-left:18px;">${dec}</div>`;
        }
        card.innerHTML = h;
        document.getElementById("msgs").prepend(card);
    }

    function timer(id, exp, dur) {
        const itv = setInterval(() => {
            const diff = exp - Date.now();
            if(diff <= 0) { clearInterval(itv); db.child(id).remove(); return; }
            const b = document.getElementById(`bar-${id}`); if(b) b.style.width = (diff/(dur*1000)*100) + "%";
        }, 1000);
    }

    window.unlock = (id, otp, pay, exp) => {
        if(document.getElementById(`i-${id}`).value === otp && Date.now() < exp) {
            const dec = CryptoJS.AES.decrypt(pay, KEY).toString(CryptoJS.enc.Utf8);
            document.getElementById(`l-${id}`).style.display="none";
            document.getElementById(`s-${id}`).innerText = dec;
            document.getElementById(`s-${id}`).style.display="block";
            navigator.clipboard.writeText(dec);
        } else { alert("Wrong OTP!"); }
    };

    // Canvas logic remains same as before...
</script>
</body>
</html>
