<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GhostType Master | 30-Feature Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        :root { --p: #38bdf8; --s: #f472b6; --bg: #0f172a; --c: #1e293b; --t: #f8fafc; }
        .light { --bg: #f1f5f9; --c: #ffffff; --t: #1e293b; }
        body { background: var(--bg); color: var(--t); font-family: 'Inter', sans-serif; transition: 0.3s; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: var(--c); width: 100%; max-width: 500px; padding: 25px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .dot { height: 10px; width: 10px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 10px #4ade80; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(0,0,0,0.1); border: 1px solid #475569; color: var(--t); border-radius: 12px; box-sizing: border-box; }
        textarea { height: 100px; resize: none; }
        .btn { cursor: pointer; border: none; border-radius: 12px; font-weight: bold; transition: 0.3s; padding: 14px; background: var(--p); color: #000; width: 100%; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .msg-card { background: rgba(255,255,255,0.05); padding: 15px; margin-top: 15px; border-radius: 15px; border-left: 4px solid var(--p); position: relative; }
        .prog { height: 4px; background: var(--s); width: 100%; margin-top: 10px; border-radius: 2px; transition: width 1s linear; }
        .trash { position: absolute; top: 10px; right: 10px; cursor: pointer; opacity: 0.5; }
        .trash:hover { opacity: 1; color: var(--s); }
        #search { border-radius: 20px; padding: 8px 15px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="card animate__animated animate__fadeIn">
    <div class="header">
        <button onclick="document.body.classList.toggle('light')" style="background:none; border:none; font-size:20px; cursor:pointer;">🌓</button>
        <h2 style="margin:0; color:var(--p);">GHOSTTYPE <small style="color:var(--t); font-size:10px;">MASTER</small></h2>
        <div><span class="dot"></span> <small>Secure</small></div>
    </div>

    <input id="deviceName" placeholder="👤 Device Name" oninput="localStorage.setItem('gName', this.value)">
    <textarea id="textInput" placeholder="Paste content..." oninput="updateCounters()"></textarea>
    <div id="counters" style="font-size:10px; text-align:right; margin-bottom:10px; color:var(--p);">0 Chars | 0 Words</div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <label style="font-size:12px; cursor:pointer;"><input type="checkbox" id="isSec"> 🔒 OTP Protection</label>
        <button onclick="send()" class="btn" style="width:140px;">Sync Now</button>
    </div>
    
    <div id="otpDisplay" style="text-align:center; color:var(--s); font-weight:bold; margin-bottom:10px;"></div>
    <input id="search" placeholder="🔍 Search history..." oninput="searchMsgs()">
    <div id="status" style="font-size:10px; text-align:center; color:#94a3b8; margin-bottom:10px;">System Ready</div>
    <div id="messages"></div>
</div>



<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDRsNoO7wS4tY9G_VFwRTsTDWwHaYbJGl4",
        authDomain: "ghosttype-67c57.firebaseapp.com",
        databaseURL: "https://ghosttype-67c57-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ghosttype-67c57",
        storageBucket: "ghosttype-67c57.firebasestorage.app",
        messagingSenderId: "965426759949",
        appId: "1:965426759949:web:08740170d41fda24478844"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("v7_master_sync");
    const KEY = "GHOST_MASTER_2026";
    const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');

    document.getElementById("deviceName").value = localStorage.getItem('gName') || "";

    function updateCounters() {
        const t = document.getElementById("textInput").value;
        document.getElementById("counters").innerText = `${t.length} Chars | ${t.trim() ? t.trim().split(/\s+/).length : 0} Words`;
    }

    function send() {
        const text = document.getElementById("textInput").value.trim();
        const dev = document.getElementById("deviceName").value || "Unknown";
        const secure = document.getElementById("isSec").checked;
        if(!text) return;

        const encrypted = CryptoJS.AES.encrypt(text, KEY).toString();
        let otp = secure ? Math.floor(100000 + Math.random()*900000).toString() : null;
        let exp = secure ? Date.now() + 60000 : null;

        if(secure) document.getElementById("otpDisplay").innerText = "OTP: " + otp;
        db.push({ dev, payload: encrypted, secure, otp, exp, time: new Date().toLocaleTimeString() });
        document.getElementById("textInput").value = "";
        updateCounters();
        document.getElementById("status").innerText = "Sent at " + new Date().toLocaleTimeString();
    }

    db.on("child_added", (snap) => {
        audio.play();
        const data = snap.val(); const id = snap.key;
        const div = document.createElement("div");
        div.className = "msg-card animate__animated animate__fadeInUp";
        div.id = `m-${id}`;
        div.dataset.raw = "";

        let html = `<small>${data.dev} • ${data.time}</small> <span class="trash" onclick="del('${id}')">🗑️</span>`;
        if(data.secure) {
            html += `<div id="l-${id}"><p style="color:var(--s); font-size:12px;">🔒 SECURE PACKET</p><div class="prog" id="b-${id}"></div><input id="i-${id}" placeholder="OTP" style="width:70px; margin-top:10px;"><button onclick="unlock('${id}','${data.otp}','${data.payload}',${data.exp})" style="padding:5px; width:auto; margin-left:10px;">Unlock</button></div><div id="s-${id}" style="display:none; font-weight:bold; color:var(--p); margin-top:10px;"></div>`;
            handleExp(id, data.exp);
        } else {
            const dec = CryptoJS.AES.decrypt(data.payload, KEY).toString(CryptoJS.enc.Utf8);
            div.dataset.raw = dec.toLowerCase();
            html += `<div style="margin-top:5px;">${dec}</div><button onclick="copy('${id}')" style="font-size:10px; width:auto; padding:2px 5px; margin-top:5px;">Copy</button><span id="c-${id}" style="display:none; margin-top:5px; font-size:14px;">${dec}</span>`;
        }
        div.innerHTML = html;
        document.getElementById("messages").prepend(div);
    });

    db.on("child_removed", (snap) => {
        const el = document.getElementById(`m-${snap.key}`);
        if(el) { el.classList.add('animate__fadeOut'); setTimeout(() => el.remove(), 500); }
    });

    function handleExp(id, exp) {
        const itv = setInterval(() => {
            const diff = exp - Date.now();
            if(diff <= 0) { clearInterval(itv); del(id); return; }
            const bar = document.getElementById(`b-${id}`);
            if(bar) bar.style.width = (diff/60000*100) + "%";
        }, 1000);
    }

    window.unlock = (id, correct, payload, exp) => {
        const val = document.getElementById(`i-${id}`).value;
        if(val === correct && Date.now() < exp) {
            const dec = CryptoJS.AES.decrypt(payload, KEY).toString(CryptoJS.enc.Utf8);
            document.getElementById(`l-${id}`).style.display="none";
            document.getElementById(`s-${id}`).innerText = dec;
            document.getElementById(`s-${id}`).style.display="block";
            document.getElementById(`m-${id}`).dataset.raw = dec.toLowerCase();
        } else { alert("Wrong OTP or Expired!"); }
    };

    window.del = (id) => db.child(id).remove();
    window.copy = (id) => {
        const t = document.getElementById(`s-${id}`) ? document.getElementById(`s-${id}`).innerText : document.getElementById(`c-${id}`).innerText;
        navigator.clipboard.writeText(t);
        document.getElementById("status").innerText = "Copied!";
    };

    function searchMsgs() {
        const q = document.getElementById("search").value.toLowerCase();
        document.querySelectorAll('.msg-card').forEach(c => c.style.display = c.dataset.raw.includes(q) ? 'block' : 'none');
    }
</script>
</body>
</html>
