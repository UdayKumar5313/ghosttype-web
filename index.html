<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GhostType Ultra | 2026 Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        :root {
            --primary: #38bdf8; --accent: #f472b6; --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc;
        }
        .light-theme {
            --bg: #f1f5f9; --card-bg: #ffffff; --text: #1e293b;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: var(--card-bg); width: 100%; max-width: 500px; padding: 25px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; }
        .online-dot { width: 10px; height: 10px; background: #4ade80; border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(0,0,0,0.1); border: 1px solid #475569; color: var(--text); border-radius: 12px; box-sizing: border-box; }
        .counter { font-size: 10px; text-align: right; color: var(--primary); margin-top: -8px; margin-bottom: 10px; }
        
        .progress-container { width: 100%; background: #334155; height: 4px; border-radius: 2px; margin-top: 5px; overflow: hidden; }
        .progress-bar { background: var(--accent); height: 100%; width: 100%; transition: width 1s linear; }

        .msg-card { background: rgba(255,255,255,0.05); padding: 15px; margin-top: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .copy-btn { position: absolute; top: 10px; right: 10px; font-size: 12px; cursor: pointer; background: var(--primary); color: #000; padding: 2px 8px; border-radius: 5px; border: none; }
        
        .search-box { margin-bottom: 15px; border-radius: 20px; padding: 8px 15px; }
        button { cursor: pointer; border: none; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        .main-btn { background: var(--primary); color: #000; width: 100%; padding: 15px; }
        .theme-btn { background: none; color: var(--primary); font-size: 20px; }
    </style>
</head>
<body>

<div class="card animate__animated animate__fadeIn">
    <div class="header-row">
        <button class="theme-btn" onclick="toggleTheme()">🌓</button>
        <h1>GHOSTTYPE <span style="font-size: 10px; background:var(--primary); color:#000; padding:2px 5px; border-radius:4px;">PRO</span></h1>
        <div><span class="online-dot"></span><small>Live</small></div>
    </div>

    <input id="deviceName" placeholder="👤 Device Name" oninput="saveName()">
    <textarea id="textInput" placeholder="Paste clipboard content..." oninput="updateCounter()"></textarea>
    <div class="counter" id="charCounter">0 chars | 0 words</div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <label style="font-size:12px;"><input type="checkbox" id="secureCheck"> 🔒 OTP Protection</label>
        <button onclick="sendData()" class="main-btn" style="width:150px;">Sync Data</button>
    </div>
    
    <div id="otpAlert" style="text-align:center; color:var(--accent); font-weight:bold; margin-bottom:10px;"></div>

    <input type="text" id="search" class="search-box" placeholder="🔍 Search history..." oninput="searchMessages()">
    <div id="messages"></div>
</div>



<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDRsNoO7wS4tY9G_VFwRTsTDWwHaYbJGl4",
        authDomain: "ghosttype-67c57.firebaseapp.com",
        databaseURL: "https://ghosttype-67c57-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ghosttype-67c57",
        storageBucket: "ghosttype-67c57.firebasestorage.app",
        messagingSenderId: "965426759949",
        appId: "1:965426759949:web:08740170d41fda24478844"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("v6_pro_sync");
    const MASTER_KEY = "GHOST_KEY_2026";
    const notificationSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');

    // Persistence: Load Name
    window.onload = () => {
        document.getElementById("deviceName").value = localStorage.getItem("ghostName") || "";
    };

    function saveName() { localStorage.setItem("ghostName", document.getElementById("deviceName").value); }

    function updateCounter() {
        const text = document.getElementById("textInput").value;
        const words = text.trim() ? text.trim().split(/\s+/).length : 0;
        document.getElementById("charCounter").innerText = `${text.length} chars | ${words} words`;
    }

    function toggleTheme() { document.body.classList.toggle("light-theme"); }

    function sendData() {
        const text = document.getElementById("textInput").value.trim();
        const dev = document.getElementById("deviceName").value || "Unknown";
        const isSec = document.getElementById("secureCheck").checked;
        if (!text) return alert("Input empty!");

        const enc = CryptoJS.AES.encrypt(text, MASTER_KEY).toString();
        let otp = isSec ? Math.floor(100000 + Math.random()*900000).toString() : null;
        let exp = isSec ? Date.now() + 60000 : null;

        if(isSec) document.getElementById("otpAlert").innerText = "OTP: " + otp;

        db.push({ dev, payload: enc, isSec, otp, exp, time: new Date().toLocaleTimeString() });
        document.getElementById("textInput").value = "";
        updateCounter();
    }

    db.on("child_added", (snap) => {
        notificationSound.play();
        const data = snap.val();
        const id = snap.key;
        renderMessage(id, data);
    });

    function renderMessage(id, data) {
        const div = document.createElement("div");
        div.className = "msg-card animate__animated animate__slideInUp";
        div.id = `msg-${id}`;
        div.dataset.text = ""; // Placeholder for search

        let html = `<small>${data.dev} • ${data.time}</small> <button class="copy-btn" id="copy-${id}" style="display:none" onclick="copyToClip('${id}')">Copy</button>`;

        if (data.isSec) {
            html += `
                <div id="lock-${id}">
                    <p style="color:var(--accent); margin:5px 0;">🔒 OTP Required</p>
                    <div class="progress-container"><div class="progress-bar" id="bar-${id}"></div></div>
                    <input id="in-${id}" placeholder="Enter OTP" style="width:80px; margin-top:10px;">
                    <button onclick="unlock('${id}', '${data.otp}', '${data.payload}', ${data.exp})">Unlock</button>
                </div>
                <div id="content-${id}" style="display:none; font-weight:bold; margin-top:10px;"></div>`;
            handleTimer(id, data.exp);
        } else {
            const dec = CryptoJS.AES.decrypt(data.payload, MASTER_KEY).toString(CryptoJS.enc.Utf8);
            div.dataset.text = dec.toLowerCase();
            html += `<div style="margin-top:5px;">${dec}</div>`;
            setTimeout(() => document.getElementById(`copy-${id}`).style.display = 'block', 100);
        }

        div.innerHTML = html;
        document.getElementById("messages").prepend(div);
    }

    function handleTimer(id, exp) {
        const itv = setInterval(() => {
            const diff = exp - Date.now();
            if (diff <= 0) {
                clearInterval(itv);
                document.getElementById(`msg-${id}`).remove();
                db.child(id).remove();
                return;
            }
            const bar = document.getElementById(`bar-${id}`);
            if (bar) bar.style.width = (diff / 60000 * 100) + "%";
        }, 1000);
    }

    window.unlock = (id, correct, payload, exp) => {
        const input = document.getElementById(`in-${id}`).value;
        if (input === correct && Date.now() < exp) {
            const dec = CryptoJS.AES.decrypt(payload, MASTER_KEY).toString(CryptoJS.enc.Utf8);
            document.getElementById(`lock-${id}`).style.display = "none";
            document.getElementById(`content-${id}`).innerText = dec;
            document.getElementById(`content-${id}`).style.display = "block";
            document.getElementById(`copy-${id}`).style.display = 'block';
            document.getElementById(`msg-${id}`).dataset.text = dec.toLowerCase();
        } else { alert("Access Denied!"); }
    };

    window.copyToClip = (id) => {
        const text = document.getElementById(`content-${id}`) ? document.getElementById(`content-${id}`).innerText : document.querySelector(`#msg-${id} div:last-child`).innerText;
        navigator.clipboard.writeText(text);
        alert("Copied!");
    };

    function searchMessages() {
        const q = document.getElementById("search").value.toLowerCase();
        document.querySelectorAll('.msg-card').forEach(card => {
            card.style.display = card.dataset.text.includes(q) ? 'block' : 'none';
        });
    }
</script>
</body>
</html>
